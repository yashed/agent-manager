openapi: 3.0.3
info:
  title: CrewAI Agent Service
  description: |
    A FastAPI service exposing a multi-agent CrewAI crew (a researcher with a
    lookup tool plus an editor). Used by the instrumentation-matrix heavy tier
    to validate CrewAI auto-instrumentation through the full deployed pipeline.
  version: 1.0.0
  contact:
    name: API Support
servers:
  - url: http://localhost:8000
    description: Local development server
paths:
  /chat:
    post:
      summary: Chat with the CrewAI crew
      description: |
        Sends a message to the crew and receives the edited answer.
      operationId: chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
            examples:
              capitalQuery:
                summary: Ask for a capital city
                value:
                  session_id: "session_123"
                  message: "What is the capital of France?"
      responses:
        '200':
          description: Successful response from the crew
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
              examples:
                capitalResponse:
                  summary: Capital city response
                  value:
                    response: "The capital of France is Paris."
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "An error occurred while processing your request"
components:
  schemas:
    ChatRequest:
      type: object
      required:
        - session_id
        - message
      properties:
        session_id:
          type: string
          description: Unique identifier for the conversation session
        message:
          type: string
          description: User's message or query
    ChatResponse:
      type: object
      required:
        - response
      properties:
        response:
          type: string
          description: The crew's response to the user's message
