name: Instrumentation matrix — PR

on:
  pull_request:
    paths:
      - 'python-instrumentation-provider/**'
      - 'libs/amp-instrumentation/**'
      - 'samples/manual-instrumentation-agent/**'
      - '.github/release-config.json'
      - '.github/workflows/instrumentation-matrix-pr.yaml'
      - '.github/actions/setup-go/**'
      - 'test/instrumentation-matrix/**'
      - 'traces-observer-service/**'
      - 'scripts/check-cassettes.py'
      - 'scripts/check-matrix-manifest.py'
      - 'scripts/check-contract-drift.sh'
      - 'Makefile'
  push:
    branches: [main]
    paths:
      - 'python-instrumentation-provider/**'
      - 'libs/amp-instrumentation/**'
      - 'samples/manual-instrumentation-agent/**'
      - '.github/release-config.json'
      - '.github/workflows/instrumentation-matrix-pr.yaml'
      - '.github/actions/setup-go/**'
      - 'test/instrumentation-matrix/**'
      - 'traces-observer-service/**'
      - 'scripts/check-cassettes.py'
      - 'scripts/check-matrix-manifest.py'
      - 'scripts/check-contract-drift.sh'
      - 'Makefile'

concurrency:
  group: instrumentation-matrix-${{ github.ref }}
  # PRs: cancel superseded runs (last push wins). Pushes to main: let runs
  # complete so we don't show "cancelled" on commits that were fine.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write

jobs:
  drift-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyyaml
      - run: make check-contract-drift
      - run: make check-matrix-manifest

  check-default-cell:
    runs-on: ubuntu-latest
    needs: drift-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install nox
        # pyyaml is needed by harness/manifest.py at module import time —
        # both `python -c "from harness.manifest import …"` below and
        # `nox -s emission` load it before any per-cell venv exists.
        run: pip install nox pyyaml
      - name: Resolve default cell id
        id: default
        working-directory: test/instrumentation-matrix
        run: |
          python -c "
          from harness.manifest import load_manifest
          m = load_manifest('matrix.yaml')
          d = m.default_cell
          print(f'cell={d.provider}-{d.provider_version}-{d.framework}-{d.framework_version}-py{d.python}')
          " >> $GITHUB_OUTPUT
      - name: Run default cell
        working-directory: test/instrumentation-matrix
        run: nox -s emission -- --cell-id=${{ steps.default.outputs.cell }}
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: default-cell-report
          path: test/instrumentation-matrix/reports/

  emission-matrix:
    runs-on: ubuntu-latest
    needs: drift-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13
      # pyyaml here is for the outer nox process — see comment above on
      # check-default-cell. Per-cell venvs install their own pyyaml.
      - run: pip install nox pyyaml
      - name: Run full emission matrix
        working-directory: test/instrumentation-matrix
        run: nox -s emission
        continue-on-error: true   # advisory; check-default-cell is the gating job
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matrix-reports
          path: test/instrumentation-matrix/reports/

  matrix-report:
    runs-on: ubuntu-latest
    needs: [emission-matrix, check-default-cell]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install nox pyyaml
      - uses: actions/download-artifact@v4
        with:
          name: matrix-reports
          path: test/instrumentation-matrix/reports/
      - name: Build summary
        working-directory: test/instrumentation-matrix
        run: nox -s report
      - name: Post / update PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          path: test/instrumentation-matrix/reports/summary.md

  cassette-leak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-cassettes.py
