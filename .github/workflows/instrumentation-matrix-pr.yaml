name: Instrumentation matrix tests - PR

on:
  pull_request:
    paths:
      - 'python-instrumentation-provider/**'
      - 'libs/amp-instrumentation/**'
      - 'samples/manual-instrumentation-agent/**'
      - '.github/release-config.json'
      - '.github/workflows/instrumentation-matrix-pr.yaml'
      - '.github/actions/setup-go/**'
      - 'test/instrumentation-matrix/**'
      - 'traces-observer-service/**'
      - 'scripts/check-cassettes.py'
      - 'scripts/check-matrix-manifest.py'
      - 'scripts/check-contract-drift.sh'
      - 'Makefile'
  push:
    branches: [main]
    paths:
      - 'python-instrumentation-provider/**'
      - 'libs/amp-instrumentation/**'
      - 'samples/manual-instrumentation-agent/**'
      - '.github/release-config.json'
      - '.github/workflows/instrumentation-matrix-pr.yaml'
      - '.github/actions/setup-go/**'
      - 'test/instrumentation-matrix/**'
      - 'traces-observer-service/**'
      - 'scripts/check-cassettes.py'
      - 'scripts/check-matrix-manifest.py'
      - 'scripts/check-contract-drift.sh'
      - 'Makefile'

concurrency:
  group: instrumentation-matrix-${{ github.ref }}
  # PRs: cancel superseded runs (last push wins). Pushes to main: let runs
  # complete so we don't show "cancelled" on commits that were fine.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  verify-contract-and-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install pyyaml
      - run: make check-contract-drift
      - run: make check-matrix-manifest

  default-cell-required:
    runs-on: ubuntu-latest
    needs: verify-contract-and-manifest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install nox
        # pyyaml is needed by harness/manifest.py at module import time —
        # both `python -c "from harness.manifest import …"` below and
        # `nox -s emission` load it before any per-cell venv exists.
        run: pip install nox pyyaml
      - name: Resolve default cell id
        id: default
        working-directory: test/instrumentation-matrix
        run: |
          python -c "
          from harness.manifest import load_manifest
          m = load_manifest('matrix.yaml')
          d = m.default_cell
          print(f'cell={d.provider}-{d.provider_version}-{d.framework}-{d.framework_version}-py{d.python}')
          " >> $GITHUB_OUTPUT
      - name: Run default cell
        working-directory: test/instrumentation-matrix
        run: nox -s emission -- --cell-id=${{ steps.default.outputs.cell }}
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: default-cell-report
          path: test/instrumentation-matrix/reports/

  full-emission-matrix:
    runs-on: ubuntu-latest
    needs: verify-contract-and-manifest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13
      # pyyaml here is for the outer nox process — see comment above on
      # default-cell-required. Per-cell venvs install their own pyyaml.
      - run: pip install nox pyyaml
      - name: Run full emission matrix
        working-directory: test/instrumentation-matrix
        run: nox -s emission
        continue-on-error: true   # advisory; default-cell-required is the gating job
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: matrix-reports
          path: test/instrumentation-matrix/reports/

  publish-matrix-summary:
    runs-on: ubuntu-latest
    needs: [full-emission-matrix, default-cell-required]
    # Run on success AND on advisory cell failures (so the summary still
    # posts when cells go red), but NOT during cancellation — a bare
    # `always()` here lingers queued when a run is superseded and has to be
    # force-cancelled. `!cancelled()` dies cleanly instead.
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install nox pyyaml
      - uses: actions/download-artifact@v8
        with:
          name: matrix-reports
          path: test/instrumentation-matrix/reports/
      - name: Build summary
        working-directory: test/instrumentation-matrix
        run: nox -s report
      - name: Publish summary to the run
        # Render the matrix table on the job's own page rather than as a PR
        # comment. Writing to $GITHUB_STEP_SUMMARY needs no write token, so
        # it works identically on fork PRs (where the GITHUB_TOKEN is
        # read-only and an issue-comment call fails with "Resource not
        # accessible by integration"). The full per-cell reports remain in
        # the `matrix-reports` artifact for deep dives.
        working-directory: test/instrumentation-matrix
        run: cat reports/summary.md >> "$GITHUB_STEP_SUMMARY"

  scan-cassettes-for-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: ./scripts/check-cassettes.py
