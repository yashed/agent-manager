name: Instrumentation matrix test - manual

on:
  workflow_dispatch:
    inputs:
      traceloop_versions:
        description: 'Comma-separated traceloop versions; "all" = every entry in matrix.yaml'
        required: false
        default: 'all'
      frameworks:
        description: 'Comma-separated framework names; "all" = every entry'
        required: false
        default: 'all'
      framework_versions:
        description: 'Comma-separated framework versions; "all" = every entry'
        required: false
        default: 'all'
      python_versions:
        description: 'Comma-separated python versions; "all" = every entry'
        required: false
        default: 'all'
      include_heavy_tier:
        description: 'Also run the heavy-tier subset against a built-from-source AMP stack'
        type: boolean
        default: false
      include_record_mode:
        description: 'Re-record cassettes (requires OPENAI/ANTHROPIC keys) and open a refresh PR'
        type: boolean
        default: false
      heavy_only:
        description: 'Skip the emission matrix and run only the heavy tier (implies heavy)'
        type: boolean
        default: false
      heavy_cell_id:
        description: 'Run only this one heavy-subset cell id (cheap iteration); empty = full subset'
        required: false
        default: ''

permissions:
  contents: read   # open-record-pr escalates to write at the job level

concurrency:
  group: instrumentation-matrix-manual-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  resolve-cells:
    runs-on: ubuntu-latest
    # Skipped for heavy-only iteration — no emission matrix to expand.
    if: ${{ !inputs.heavy_only }}
    outputs:
      cell_ids: ${{ steps.expand.outputs.cell_ids }}
      count: ${{ steps.expand.outputs.count }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install pyyaml
      - name: Expand to cell ids
        id: expand
        working-directory: test/instrumentation-matrix
        env:
          FILTER_TRACELOOP_VERSIONS: ${{ inputs.traceloop_versions }}
          FILTER_FRAMEWORKS: ${{ inputs.frameworks }}
          FILTER_FRAMEWORK_VERSIONS: ${{ inputs.framework_versions }}
          FILTER_PYTHON_VERSIONS: ${{ inputs.python_versions }}
        run: python scripts/expand_filter.py
      - name: Guard against empty filter
        if: steps.expand.outputs.count == '0'
        run: |
          echo "::error::filter resolved zero cells; check the input values."
          exit 1

  run-cells:
    runs-on: ubuntu-latest
    needs: resolve-cells
    strategy:
      fail-fast: false
      # GitHub caps matrix size at 256; budget below caps the parallelism so
      # 200+ filtered cells don't queue runners for everyone else.
      max-parallel: 8
      matrix:
        cell: ${{ fromJSON(needs.resolve-cells.outputs.cell_ids) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13
      - run: pip install nox pyyaml
      - name: Run cell
        working-directory: test/instrumentation-matrix
        env:
          # `once` records missing interactions; `none` is replay-only.
          VCR_RECORD_MODE: ${{ inputs.include_record_mode && 'once' || 'none' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: nox -s emission -- --cell-id=${{ matrix.cell }}
      # Artifact name is keyed by run-id + cell id so multiple manual runs
      # don't collide. The trailing slashes pull cells/ and cassettes/ both.
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: manual-cell-${{ matrix.cell }}
          path: |
            test/instrumentation-matrix/reports/
            test/instrumentation-matrix/cassettes/

  open-record-pr:
    runs-on: ubuntu-latest
    needs: run-cells
    if: ${{ inputs.include_record_mode }}
    permissions:
      contents: write        # push the refresh branch
      pull-requests: write   # open the cassette-refresh PR
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          # Download every manual-cell-* artifact into a single staging dir.
          # Each unpacks into manual-cell-<id>/cassettes/<framework>/...
          path: /tmp/artifacts
      - name: Merge re-recorded cassettes into the working tree
        run: |
          set -euo pipefail
          shopt -s nullglob
          target="test/instrumentation-matrix/cassettes"
          mkdir -p "$target"
          for d in /tmp/artifacts/manual-cell-*/cassettes; do
            echo "merging from $d"
            rsync -a --include='*/' --include='*.yaml' --exclude='*' "$d"/ "$target"/
          done
          git status -- "$target"
      - name: Open refresh PR
        uses: peter-evans/create-pull-request@84ae59a2cdc2258d6fa0732dd66352dddae2a412 # v7.0.9
        with:
          branch: chore/refresh-cassettes-${{ github.run_id }}
          title: Refresh instrumentation-matrix cassettes
          commit-message: Refresh cassettes from manual matrix run ${{ github.run_id }}
          add-paths: test/instrumentation-matrix/cassettes/**
          body: |
            Auto-generated by `instrumentation-matrix-manual` run
            [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            Filter inputs:
            - traceloop_versions: `${{ inputs.traceloop_versions }}`
            - frameworks: `${{ inputs.frameworks }}`
            - framework_versions: `${{ inputs.framework_versions }}`
            - python_versions: `${{ inputs.python_versions }}`

            Review the cassette diffs before merging — a meaningful change
            (new attributes, different prompt response) is a signal worth
            investigating, not a rubber-stamp refresh.

  heavy:
    runs-on: ubuntu-latest
    needs: run-cells
    # Normal run: gate behind a green emission matrix. heavy_only: run
    # regardless (run-cells is skipped), so always() is needed to evaluate at all.
    if: ${{ always() && (inputs.heavy_only || (inputs.include_heavy_tier && needs.run-cells.result == 'success')) }}
    steps:
      - uses: actions/checkout@v6
      # Build AMP component images from this branch + stand up the stack on
      # k3d (build-from-source, not released images).
      - uses: ./.github/actions/amp-dev-stack
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      # requests: heavy/driver.py + amp_client/observer use it for the
      # AMP REST + observer calls (the emission tier never makes live calls).
      # jsonschema: harness.validator validates spans against the contract.
      - run: pip install nox pyyaml requests jsonschema
      - name: Run heavy tier
        working-directory: test/instrumentation-matrix
        # URLs + IDP creds default to the dev bring-up's values; only the LLM
        # keys are secrets, forwarded into each deployed agent.
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # The deployed customer-support-agent's web-search tool needs this.
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          # Optional single-cell run for cheap iteration; empty = full subset.
          HEAVY_CELL_ID: ${{ inputs.heavy_cell_id }}
          # Build each deployed sample from the ref under test, so a PR can
          # validate a new/changed sample before it merges to main.
          AMP_AGENT_REPO_BRANCH: ${{ github.ref_name }}
        run: nox -s heavy
      - name: Dump cluster diagnostics on failure
        if: failure()
        shell: bash
        run: |
          set +e
          echo "=== port-forward liveness (HTTP 000 = no connection / dropped forward) ==="
          for p in 9000 8195 9243 22893 8090 9098 8200; do
            code=$(curl -s -m3 -o /dev/null -w "%{http_code}" "http://localhost:$p" 2>/dev/null)
            echo "  localhost:$p -> ${code:-000}"
          done
          echo "=== pods (all namespaces) ==="
          kubectl get pods -A -o wide
          echo "=== agent pod logs (incl. Running — the deploy may be healthy yet acked failed) ==="
          kubectl get pods -A --no-headers 2>/dev/null \
            | awk '/traceloop-/{print $1" "$2}' \
            | while read -r ns pod; do
                echo "----- $ns/$pod -----"
                kubectl describe pod -n "$ns" "$pod" 2>/dev/null | sed -n '/Events:/,$p' | tail -25
                kubectl logs -n "$ns" "$pod" --all-containers --tail=80 2>/dev/null
              done
          echo "=== OpenChoreo / gateway CRD kinds present ==="
          mapfile -t KINDS < <(kubectl get crd -o name 2>/dev/null | grep -iE 'openchoreo|api-platform|wso2' | sed 's#.*/##')
          printf '  %s\n' "${KINDS[@]}"
          echo "=== agent CR instances + status (deploy/binding/release/component/workload) ==="
          for k in "${KINDS[@]}"; do
            while read -r ns name _; do
              [ "$ns" = "NAMESPACE" ] && continue
              case "$name" in
                *traceloop-*)
                  echo "--- $k $ns/$name ---"
                  kubectl get "$k" "$name" -n "$ns" -o yaml 2>/dev/null | sed -n '/^status:/,$p' | head -50 ;;
              esac
            done < <(kubectl get "$k" -A 2>/dev/null)
          done
          echo "=== data-plane cluster-agent logs (sends deploy acks) ==="
          kubectl logs -n openchoreo-data-plane deploy/cluster-agent-dataplane --tail=100 2>/dev/null
          echo "=== gateway controller logs ==="
          kubectl get pods -n openchoreo-data-plane --no-headers 2>/dev/null \
            | awk '/gateway-controller/{print $1}' \
            | while read -r p; do echo "----- $p -----"; kubectl logs -n openchoreo-data-plane "$p" --tail=80 2>/dev/null; done
          echo "=== recent events ==="
          kubectl get events -A --sort-by=.lastTimestamp 2>/dev/null | tail -80
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: manual-heavy
          path: test/instrumentation-matrix/reports/heavy/
