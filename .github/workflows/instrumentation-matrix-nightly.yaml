name: Instrumentation matrix — nightly

# Tier 2: cron-driven nightly. Runs the full emission matrix, the heavy-tier
# subset (advisory until heavy bodies land — see heavy/HEAVY-TIER-DEPLOY.md),
# revalidates known-broken cells, and on any red opens / updates a single
# tracking issue + pings Google Chat.

on:
  schedule:
    - cron: '30 3 * * *'             # 03:30 UTC / 09:00 IST — matches traceloop-release-watch
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: read              # required for `gh run download` cross-workflow

concurrency:
  group: instrumentation-matrix-nightly
  # Don't cancel mid-run: a flapping cron shouldn't be able to interrupt an
  # in-progress nightly halfway through the heavy tier.
  cancel-in-progress: false

jobs:
  emission-matrix-full:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13
      # pyyaml is required by harness/manifest.py at module import time —
      # `nox -s emission` loads it before any per-cell venv exists.
      - run: pip install nox pyyaml
      - name: Run full emission matrix
        working-directory: test/instrumentation-matrix
        run: nox -s emission
        continue-on-error: true   # advisory — failures surface in the report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-emission
          path: test/instrumentation-matrix/reports/cells/

  heavy-tier:
    runs-on: ubuntu-latest
    needs: emission-matrix-full
    timeout-minutes: 90
    # Heavy bodies in heavy/amp_client.py and heavy/observer.py are
    # scaffold-only (NotImplementedError); this job is expected to fail at
    # the deploy step until Phase 8+ fills them. `continue-on-error: true`
    # keeps the rest of the nightly running. Once bodies land, drop this
    # flag and surface heavy failures the same way emission does.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version
      - name: Install helm + kubectl
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          curl -LO "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
      # The snapshot lives in another workflow's artifacts; pull the latest
      # successful build via `gh run download`. Falls through with a warning
      # if no snapshot exists yet — the driver's env precheck will then surface
      # the missing AMP_API_BASE_URL.
      - name: Restore AMP snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/amp-snapshot
          if gh run download \
              --repo ${{ github.repository }} \
              --name amp-heavy-snapshot \
              --dir /tmp/amp-snapshot \
              -w heavy-tier-snapshot.yaml 2>/dev/null; then
            echo "snapshot restored to /tmp/amp-snapshot"
            ls -lh /tmp/amp-snapshot/
          else
            echo "::warning::no heavy-tier snapshot artifact available; heavy tier will fail at deploy"
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install nox pyyaml
      - name: Run heavy tier
        working-directory: test/instrumentation-matrix
        # Required env vars are set in the matching org/repo secrets once the
        # heavy bodies land (Phase 8+). Until then, the driver fails fast at
        # the env precheck with a clear pointer to HEAVY-TIER-DEPLOY.md.
        env:
          AMP_API_BASE_URL: ${{ secrets.AMP_API_BASE_URL }}
          TRACES_OBSERVER_BASE_URL: ${{ secrets.TRACES_OBSERVER_BASE_URL }}
          IDP_TOKEN_URL: ${{ secrets.IDP_TOKEN_URL }}
          IDP_CLIENT_ID: ${{ secrets.IDP_CLIENT_ID }}
          IDP_CLIENT_SECRET: ${{ secrets.IDP_CLIENT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: nox -s heavy
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-heavy
          path: test/instrumentation-matrix/reports/heavy/

  revalidate-known-broken:
    runs-on: ubuntu-latest
    needs: emission-matrix-full
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13
      - run: pip install nox pyyaml
      - name: Expand known-broken cells
        id: expand
        working-directory: test/instrumentation-matrix
        run: |
          python <<'PY' > /tmp/revalidate-cells.txt
          import sys
          sys.path.insert(0, ".")
          from harness.manifest import load_manifest
          from harness.revalidate import cells_from_known_broken
          for c in cells_from_known_broken(load_manifest("matrix.yaml")):
              print(c.id)
          PY
          if [ -s /tmp/revalidate-cells.txt ]; then
            echo "have_cells=true" >> "$GITHUB_OUTPUT"
            echo "Revalidating $(wc -l < /tmp/revalidate-cells.txt) known-broken cell(s)"
            cat /tmp/revalidate-cells.txt
          else
            echo "have_cells=false" >> "$GITHUB_OUTPUT"
            echo "No known-broken entries — nothing to revalidate."
          fi
      - name: Run revalidation
        if: steps.expand.outputs.have_cells == 'true'
        working-directory: test/instrumentation-matrix
        env:
          # Route reports into a side directory so they don't overwrite the
          # main emission run; the noxfile honors REPORTS_DIR.
          REPORTS_DIR: reports/revalidate
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p reports/revalidate
          while read cell; do
            nox -s emission -- --cell-id="$cell" || true
          done < /tmp/revalidate-cells.txt
      - name: Open issue when a known-broken cell now passes
        if: steps.expand.outputs.have_cells == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: test/instrumentation-matrix
        run: |
          passing=$(python <<'PY'
          import json, glob
          for f in sorted(glob.glob("reports/revalidate/*.json")):
              r = json.load(open(f))
              if r["result"] == "pass":
                  print(r["cellId"])
          PY
          )
          if [ -n "$passing" ]; then
            {
              echo "The following cells are listed in \`matrix.yaml.known-broken\` but now pass revalidation. Drop their entries:"
              echo
              while read -r cell; do echo "- \`$cell\`"; done <<< "$passing"
            } > /tmp/revalidate-body.md
            gh issue create \
              --title "known-broken cells now passing — drop exemptions" \
              --label instrumentation-matrix-revalidate \
              --body-file /tmp/revalidate-body.md
          fi
      - uses: actions/upload-artifact@v4
        if: always() && steps.expand.outputs.have_cells == 'true'
        with:
          name: nightly-revalidate
          path: test/instrumentation-matrix/reports/revalidate/

  report:
    runs-on: ubuntu-latest
    needs: [emission-matrix-full, heavy-tier, revalidate-known-broken]
    if: always()
    outputs:
      counts_json: ${{ steps.metrics.outputs.counts_json }}
      has_failures: ${{ steps.metrics.outputs.has_failures }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install nox pyyaml
      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: nightly-emission
          path: test/instrumentation-matrix/reports/cells/
        continue-on-error: true
      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: nightly-heavy
          path: test/instrumentation-matrix/reports/heavy/
        continue-on-error: true
      - name: Build summary
        working-directory: test/instrumentation-matrix
        run: nox -s report
      - name: Compute alert metrics
        id: metrics
        working-directory: test/instrumentation-matrix
        run: |
          python <<'PY' >> "$GITHUB_OUTPUT"
          import json, sys
          sys.path.insert(0, ".")
          from pathlib import Path
          from harness.aggregator import collect_metrics
          m = collect_metrics(Path("reports/cells"))
          # Single-line JSON for the GITHUB_OUTPUT escape rules.
          print(f"counts_json={json.dumps(m)}")
          print(f"has_failures={'true' if m['counts'].get('fail', 0) > 0 else 'false'}")
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-summary
          path: test/instrumentation-matrix/reports/summary.md

  open-issue-on-failure:
    runs-on: ubuntu-latest
    needs: report
    if: needs.report.outputs.has_failures == 'true' || needs.emission-matrix-full.result == 'failure'
    outputs:
      issue_url: ${{ steps.issue.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: nightly-summary
          path: /tmp/summary
      - name: Open or update tracking issue
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh issue list \
            --label instrumentation-matrix-failure \
            --state open \
            --json number,url --jq '.[0]')
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            number=$(echo "$existing" | python3 -c 'import json,sys;print(json.load(sys.stdin)["number"])')
            url=$(echo "$existing" | python3 -c 'import json,sys;print(json.load(sys.stdin)["url"])')
            gh issue comment "$number" --body-file /tmp/summary/summary.md
            echo "url=$url" >> "$GITHUB_OUTPUT"
          else
            url=$(gh issue create \
              --title "Instrumentation matrix nightly failure" \
              --label instrumentation-matrix-failure \
              --body-file /tmp/summary/summary.md)
            echo "url=$url" >> "$GITHUB_OUTPUT"
          fi

  notify-google-chat:
    runs-on: ubuntu-latest
    needs: [report, open-issue-on-failure]
    # Quiet on success: only ping Chat when the report flagged failures.
    if: needs.report.outputs.has_failures == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pyyaml
      - name: Post Chat message
        env:
          # Matches the secret name `traceloop-release-watch.yaml` already uses.
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
          ISSUE_URL: ${{ needs.open-issue-on-failure.outputs.issue_url }}
          METRICS_JSON: ${{ needs.report.outputs.counts_json }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        working-directory: test/instrumentation-matrix
        run: |
          if [ -z "${GCHAT_WEBHOOK_URL}" ]; then
            echo "::warning::GCHAT_WEBHOOK_URL secret is not set; skipping Chat notification."
            exit 0
          fi
          python <<'PY'
          import json, os, sys
          sys.path.insert(0, ".")
          import requests
          from harness.notify import build_chat_message

          metrics = json.loads(os.environ["METRICS_JSON"])
          msg = build_chat_message(
              run_url=os.environ["RUN_URL"],
              issue_url=os.environ.get("ISSUE_URL") or None,
              counts=metrics.get("counts", {}),
              categories=metrics.get("categories", {}),
              likely_cause=metrics.get("likely_cause"),
          )
          r = requests.post(os.environ["GCHAT_WEBHOOK_URL"], json=msg, timeout=15)
          r.raise_for_status()
          print("Chat alert posted.")
          PY
