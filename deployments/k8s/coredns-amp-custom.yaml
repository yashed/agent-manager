# CoreDNS custom config for k3d clusters
# Rewrites *.openchoreo.localhost and *.amp.localhost hostnames to host.k3d.internal
# so pods can reach services exposed via k3d load balancer
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  openchoreo.override: |
    rewrite stop {
      name regex (.+\.)?openchoreo\.localhost host.k3d.internal
      answer auto
    }
  amp.override: |
    rewrite stop {
      name regex (.+\.)?amp\.localhost host.k3d.internal
      answer auto
    }
  # The dev gateway chart + setup-gateway.sh reach agent-manager via
  # host.docker.internal (Docker Desktop / Colima inject it into k3d pods).
  # A plain Linux k3d runner (CI) has no such injection, so fold it onto
  # host.k3d.internal, which k3d guarantees on every platform.
  hostdocker.override: |
    rewrite stop {
      name regex host\.docker\.internal host.k3d.internal
      answer auto
    }
