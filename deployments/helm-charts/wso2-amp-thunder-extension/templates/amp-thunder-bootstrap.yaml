{{- $scheme := ternary "http" "https" .Values.thunder.configuration.server.httpOnly }}
{{- $port := .Values.thunder.configuration.server.port }}
{{- $thunderUrl := printf "%s://localhost:%d" $scheme (int $port) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: amp-thunder-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: thunder-bootstrap
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
data:
  50-amp-api-client.sh: |
    #!/bin/bash
    set -e

    SCRIPT_DIR="$(dirname "${BASH_SOURCE[0]:-$0}")"
    source "${SCRIPT_DIR}/common.sh"

    log_info "Checking if application '{{ .Values.thunder.bootstrap.ampApiClient.name }}' already exists..."

    # Get the default OU ID
    RESPONSE=$(thunder_api_call GET "/organization-units/tree/default")
    HTTP_CODE="${RESPONSE: -3}"
    BODY="${RESPONSE%???}"
    if [[ "$HTTP_CODE" != "200" ]]; then
      log_error "Failed to fetch default organization unit (HTTP $HTTP_CODE)"
      echo "Response: $BODY"
      exit 1
    fi
    DEFAULT_OU_ID=$(echo "$BODY" | grep -o '"handle":"default"[^}]*"id":"[^"]*"\|"id":"[^"]*"[^}]*"handle":"default"' | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)

    if [[ -z "$DEFAULT_OU_ID" ]]; then
      log_error "Could not extract default organization unit ID from response"
      echo "Response: $BODY"
      exit 1
    fi
    log_info "Using OU ID: $DEFAULT_OU_ID"

    # Look up the default auth flow ID
    RESPONSE=$(thunder_api_call GET "/flows?flowType=AUTHENTICATION&limit=200")
    HTTP_CODE="${RESPONSE: -3}"
    BODY="${RESPONSE%???}"
    if [[ "$HTTP_CODE" != "200" ]]; then
      log_error "Failed to fetch authentication flows (HTTP $HTTP_CODE)"
      echo "Response: $BODY"
      exit 1
    fi
    AUTH_FLOW_ID=$(echo "$BODY" | sed 's/},{/}\n{/g' | grep '"handle":"default-basic-flow"' | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)

    if [[ -z "$AUTH_FLOW_ID" ]]; then
      log_error "Could not find default-basic-flow authentication flow"
      exit 1
    fi
    log_info "Using auth flow ID: $AUTH_FLOW_ID"

    # Check if app already exists
    RESPONSE=$(thunder_api_call GET "/applications")
    HTTP_CODE="${RESPONSE: -3}"
    BODY="${RESPONSE%???}"
    if [[ "$HTTP_CODE" != "200" ]]; then
      log_error "Failed to fetch applications (HTTP $HTTP_CODE)"
      echo "Response: $BODY"
      exit 1
    fi

    APP_PAYLOAD='{
      "name": "{{ .Values.thunder.bootstrap.ampApiClient.name }}",
      "description": "{{ .Values.thunder.bootstrap.ampApiClient.description }}",
      "ouId": "'${DEFAULT_OU_ID}'",
      "authFlowId": "'${AUTH_FLOW_ID}'",
      "inboundAuthConfig": [
        {
          "type": "oauth2",
          "config": {
            "clientId": "{{ .Values.thunder.bootstrap.ampApiClient.clientId }}",
            "clientSecret": "{{ .Values.thunder.bootstrap.ampApiClient.clientSecret }}",
            "grantTypes": {{ .Values.thunder.bootstrap.ampApiClient.grantTypes | toJson }},
            "tokenEndpointAuthMethod": "{{ .Values.thunder.bootstrap.ampApiClient.tokenEndpointAuthMethod }}",
            "pkceRequired": {{ .Values.thunder.bootstrap.ampApiClient.pkceRequired }},
            "publicClient": {{ .Values.thunder.bootstrap.ampApiClient.publicClient }},
            "token": {
              "accessToken": {
                "validityPeriod": {{ .Values.thunder.bootstrap.ampApiClient.accessTokenValidityPeriod }}
              }
            }
          }
        }
      ]
    }'

    if echo "$BODY" | grep -q '"clientId":"{{ .Values.thunder.bootstrap.ampApiClient.clientId }}"'; then
      app_id=$(echo "$BODY" | sed 's/},{/}\n{/g' | grep '"clientId":"{{ .Values.thunder.bootstrap.ampApiClient.clientId }}"' | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
      log_info "Application '{{ .Values.thunder.bootstrap.ampApiClient.name }}' already exists (id: $app_id), updating..."
      RESPONSE=$(thunder_api_call PUT "/applications/$app_id" "$APP_PAYLOAD")
      HTTP_CODE="${RESPONSE: -3}"
      if [[ "$HTTP_CODE" == "200" ]]; then
        log_info "Application '{{ .Values.thunder.bootstrap.ampApiClient.name }}' updated successfully"
      else
        log_error "Failed to update application (HTTP $HTTP_CODE)"
        echo "Response: ${RESPONSE%???}"
        exit 1
      fi
    else
      log_info "Application '{{ .Values.thunder.bootstrap.ampApiClient.name }}' does not exist, creating..."
      RESPONSE=$(thunder_api_call POST "/applications" "$APP_PAYLOAD")
      HTTP_CODE="${RESPONSE: -3}"
      if [[ "$HTTP_CODE" == "201" ]] || [[ "$HTTP_CODE" == "200" ]]; then
        log_info "Application '{{ .Values.thunder.bootstrap.ampApiClient.name }}' created successfully"
      elif [[ "$HTTP_CODE" == "409" ]]; then
        log_info "Application '{{ .Values.thunder.bootstrap.ampApiClient.name }}' already exists, skipping"
      else
        log_error "Failed to create application (HTTP $HTTP_CODE)"
        echo "Response: ${RESPONSE%???}"
        exit 1
      fi
    fi

  51-user-schema-and-users.sh: |
    #!/bin/bash
    set -e

    SCRIPT_DIR="$(dirname "${BASH_SOURCE[0]:-$0}")"
    source "${SCRIPT_DIR}/common.sh"

    # Get the default OU ID
    RESPONSE=$(thunder_api_call GET "/organization-units/tree/default")
    HTTP_CODE="${RESPONSE: -3}"
    BODY="${RESPONSE%???}"
    if [[ "$HTTP_CODE" != "200" ]]; then
      log_error "Failed to fetch default organization unit (HTTP $HTTP_CODE)"
      echo "Response: $BODY"
      exit 1
    fi
    DEFAULT_OU_ID=$(echo "$BODY" | grep -o '"handle":"default"[^}]*"id":"[^"]*"\|"id":"[^"]*"[^}]*"handle":"default"' | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)

    if [[ -z "$DEFAULT_OU_ID" ]]; then
      log_error "Could not extract default organization unit ID from response"
      echo "Response: $BODY"
      exit 1
    fi
    log_info "Using organization unit ID: $DEFAULT_OU_ID"

    log_info "Checking if user schema '{{ .Values.thunder.bootstrap.userSchema.name }}' already exists..."
    RESPONSE=$(thunder_api_call GET "/user-schemas")
    HTTP_CODE="${RESPONSE: -3}"
    BODY="${RESPONSE%???}"
    if [[ "$HTTP_CODE" != "200" ]]; then
      log_error "Failed to fetch user schemas (HTTP $HTTP_CODE)"
      echo "Response: $BODY"
      exit 1
    fi

    if echo "$BODY" | grep -q '"name":"{{ .Values.thunder.bootstrap.userSchema.name }}"'; then
      log_info "User schema '{{ .Values.thunder.bootstrap.userSchema.name }}' already exists, skipping creation"
    else
      log_info "User schema does not exist, creating user schema '{{ .Values.thunder.bootstrap.userSchema.name }}'..."
      RESPONSE=$(thunder_api_call POST "/user-schemas" "{
        \"name\": \"{{ .Values.thunder.bootstrap.userSchema.name }}\",
        \"ouId\": \"$DEFAULT_OU_ID\",
        \"allowSelfRegistration\": {{ .Values.thunder.bootstrap.userSchema.allowSelfRegistration }},
        \"schema\": {
          \"username\": {
            \"type\": \"string\",
            \"displayName\": \"Username\",
            \"required\": true,
            \"unique\": true
          },
          \"password\": {
            \"type\": \"string\",
            \"displayName\": \"Password\",
            \"required\": true,
            \"credential\": true
          },
          \"given_name\": {
            \"type\": \"string\",
            \"displayName\": \"First Name\"
          },
          \"family_name\": {
            \"type\": \"string\",
            \"displayName\": \"Last Name\"
          },
          \"groups\": {
            \"type\": \"array\",
            \"displayName\": \"Groups\",
            \"items\": {\"type\": \"string\"}
          }
        },
        \"systemAttributes\": {
          \"display\": \"username\"
        }
      }")

      HTTP_CODE="${RESPONSE: -3}"
      if [[ "$HTTP_CODE" == "201" ]] || [[ "$HTTP_CODE" == "200" ]]; then
        log_info "User schema created successfully"
      elif [[ "$HTTP_CODE" == "409" ]]; then
        log_info "User schema already exists, skipping"
      else
        log_error "Failed to create user schema (HTTP $HTTP_CODE)"
        echo "Response: ${RESPONSE%???}"
        exit 1
      fi
    fi

    # Create default users
    {{- if .Values.thunder.bootstrap.defaultUsers }}
    {{- range .Values.thunder.bootstrap.defaultUsers }}
    log_info "Checking if user '{{ .username }}' already exists..."
    RESPONSE=$(thunder_api_call GET "/users")
    HTTP_CODE="${RESPONSE: -3}"
    BODY="${RESPONSE%???}"
    if [[ "$HTTP_CODE" != "200" ]]; then
      log_error "Failed to fetch users (HTTP $HTTP_CODE)"
      echo "Response: $BODY"
      exit 1
    fi

    if echo "$BODY" | grep -q '"username":"{{ .username }}"'; then
      log_info "User '{{ .username }}' already exists, skipping creation"
    else
      log_info "User does not exist, creating user '{{ .username }}'..."
      RESPONSE=$(thunder_api_call POST "/users" "{
        \"type\": \"{{ $.Values.thunder.bootstrap.userSchema.name }}\",
        \"ouId\": \"$DEFAULT_OU_ID\",
        \"attributes\": {
          \"username\": \"{{ .username }}\",
          \"password\": \"{{ .password }}\",
          \"given_name\": \"{{ .givenName }}\",
          \"family_name\": \"{{ .familyName }}\",
          \"groups\": {{ .groups | toJson | replace "\"" "\\\"" }}
        }
      }")

      HTTP_CODE="${RESPONSE: -3}"
      if [[ "$HTTP_CODE" == "201" ]] || [[ "$HTTP_CODE" == "200" ]]; then
        log_info "User '{{ .username }}' created successfully"
      elif [[ "$HTTP_CODE" == "409" ]]; then
        log_info "User '{{ .username }}' already exists, skipping"
      else
        log_error "Failed to create user (HTTP $HTTP_CODE)"
        echo "Response: ${RESPONSE%???}"
        exit 1
      fi
    fi
    {{- end }}
    {{- end }}

  52-amp-console-branding.sh: |
    #!/bin/bash
    set -e

    SCRIPT_DIR="$(dirname "${BASH_SOURCE[0]:-$0}")"
    source "${SCRIPT_DIR}/common.sh"

    # -----------------------------------------------------------------------
    # 1. Upsert the Agent Manager Console layout (GET → PUT if exists, POST if not)
    # -----------------------------------------------------------------------
    LAYOUT_ID="{{ .Values.thunder.bootstrap.ampConsoleLayout.id }}"
    log_info "Checking if Agent Manager Console layout (id: $LAYOUT_ID) exists..."

    LAYOUT_PAYLOAD='{{ .Values.thunder.bootstrap.ampConsoleLayout | toJson }}'

    RESPONSE=$(thunder_api_call GET "/design/layouts/$LAYOUT_ID")
    HTTP_CODE="${RESPONSE: -3}"

    if [[ "$HTTP_CODE" == "200" ]]; then
      log_info "Layout exists, updating..."
      RESPONSE=$(thunder_api_call PUT "/design/layouts/$LAYOUT_ID" "$LAYOUT_PAYLOAD")
      HTTP_CODE="${RESPONSE: -3}"
      if [[ "$HTTP_CODE" == "200" ]] || [[ "$HTTP_CODE" == "201" ]]; then
        log_info "Layout updated successfully"
        echo "$LAYOUT_ID" > /tmp/amp-console-layout-id
      else
        log_error "Failed to update layout (HTTP $HTTP_CODE)"
        echo "Response: ${RESPONSE%???}"
        exit 1
      fi
    elif [[ "$HTTP_CODE" == "404" ]]; then
      log_info "Layout not found, creating..."
      RESPONSE=$(thunder_api_call POST "/design/layouts" "$LAYOUT_PAYLOAD")
      HTTP_CODE="${RESPONSE: -3}"
      BODY="${RESPONSE%???}"
      if [[ "$HTTP_CODE" == "201" ]] || [[ "$HTTP_CODE" == "200" ]]; then
        NEW_LAYOUT_ID=$(echo "$BODY" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
        log_info "Layout created successfully (id: $NEW_LAYOUT_ID)"
        echo "$NEW_LAYOUT_ID" > /tmp/amp-console-layout-id
      else
        log_error "Failed to create layout (HTTP $HTTP_CODE)"
        echo "Response: ${RESPONSE%???}"
        exit 1
      fi
    else
      log_error "Failed to check layout existence (HTTP $HTTP_CODE)"
      echo "Response: ${RESPONSE%???}"
      exit 1
    fi

    # -----------------------------------------------------------------------
    # 2. Upsert the Agent Manager Console theme (find by handle, then PUT/POST)
    # -----------------------------------------------------------------------
    THEME_HANDLE="{{ .Values.thunder.bootstrap.ampConsoleTheme.handle }}"
    log_info "Checking if theme '$THEME_HANDLE' already exists..."

    RESPONSE=$(thunder_api_call GET "/design/themes")
    HTTP_CODE="${RESPONSE: -3}"
    BODY="${RESPONSE%???}"
    if [[ "$HTTP_CODE" != "200" ]]; then
      log_error "Failed to list themes (HTTP $HTTP_CODE)"
      echo "Response: $BODY"
      exit 1
    fi

    EXISTING_THEME_ID=$(echo "$BODY" | sed 's/},{/}\n{/g' | grep "\"handle\":\"$THEME_HANDLE\"" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)

    THEME_PAYLOAD='{{ .Values.thunder.bootstrap.ampConsoleTheme | toJson }}'

    if [[ -n "$EXISTING_THEME_ID" ]]; then
      log_info "Theme '$THEME_HANDLE' exists (id: $EXISTING_THEME_ID), updating..."
      RESPONSE=$(thunder_api_call PUT "/design/themes/$EXISTING_THEME_ID" "$THEME_PAYLOAD")
      HTTP_CODE="${RESPONSE: -3}"
      if [[ "$HTTP_CODE" == "200" ]]; then
        log_info "Theme updated successfully"
        echo "$EXISTING_THEME_ID" > /tmp/amp-console-theme-id
      else
        log_error "Failed to update theme (HTTP $HTTP_CODE)"
        echo "Response: ${RESPONSE%???}"
        exit 1
      fi
    else
      log_info "Theme '$THEME_HANDLE' not found, creating..."
      RESPONSE=$(thunder_api_call POST "/design/themes" "$THEME_PAYLOAD")
      HTTP_CODE="${RESPONSE: -3}"
      BODY="${RESPONSE%???}"
      if [[ "$HTTP_CODE" == "201" ]] || [[ "$HTTP_CODE" == "200" ]]; then
        NEW_THEME_ID=$(echo "$BODY" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
        log_info "Theme created successfully (id: $NEW_THEME_ID)"
        echo "$NEW_THEME_ID" > /tmp/amp-console-theme-id
      else
        log_error "Failed to create theme (HTTP $HTTP_CODE)"
        echo "Response: $BODY"
        exit 1
      fi
    fi

  53-amp-console-app.sh: |
    #!/bin/bash
    set -e

    SCRIPT_DIR="$(dirname "${BASH_SOURCE[0]:-$0}")"
    source "${SCRIPT_DIR}/common.sh"

    log_info "Checking if application '{{ .Values.thunder.bootstrap.ampConsoleClient.name }}' already exists..."

    # Read theme ID and layout ID written by 51b-amp-console-branding.sh
    CONSOLE_THEME_ID=$(cat /tmp/amp-console-theme-id 2>/dev/null || echo "")
    CONSOLE_LAYOUT_ID=$(cat /tmp/amp-console-layout-id 2>/dev/null || echo "{{ .Values.thunder.bootstrap.ampConsoleLayout.id }}")

    # Get the default OU ID
    RESPONSE=$(thunder_api_call GET "/organization-units/tree/default")
    HTTP_CODE="${RESPONSE: -3}"
    BODY="${RESPONSE%???}"
    if [[ "$HTTP_CODE" != "200" ]]; then
      log_error "Failed to fetch default organization unit (HTTP $HTTP_CODE)"
      echo "Response: $BODY"
      exit 1
    fi
    DEFAULT_OU_ID=$(echo "$BODY" | grep -o '"handle":"default"[^}]*"id":"[^"]*"\|"id":"[^"]*"[^}]*"handle":"default"' | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)

    if [[ -z "$DEFAULT_OU_ID" ]]; then
      log_error "Could not extract default organization unit ID from response"
      echo "Response: $BODY"
      exit 1
    fi
    log_info "Using OU ID: $DEFAULT_OU_ID"

    # Look up the default auth flow ID
    RESPONSE=$(thunder_api_call GET "/flows?flowType=AUTHENTICATION&limit=200")
    HTTP_CODE="${RESPONSE: -3}"
    BODY="${RESPONSE%???}"
    if [[ "$HTTP_CODE" != "200" ]]; then
      log_error "Failed to fetch authentication flows (HTTP $HTTP_CODE)"
      echo "Response: $BODY"
      exit 1
    fi
    AUTH_FLOW_ID=$(echo "$BODY" | sed 's/},{/}\n{/g' | grep '"handle":"default-basic-flow"' | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)

    if [[ -z "$AUTH_FLOW_ID" ]]; then
      log_error "Could not find default-basic-flow authentication flow"
      exit 1
    fi
    log_info "Using auth flow ID: $AUTH_FLOW_ID"

    # Check existing apps
    RESPONSE=$(thunder_api_call GET "/applications")
    HTTP_CODE="${RESPONSE: -3}"
    BODY="${RESPONSE%???}"
    if [[ "$HTTP_CODE" != "200" ]]; then
      log_error "Failed to fetch applications (HTTP $HTTP_CODE)"
      echo "Response: $BODY"
      exit 1
    fi

    APP_PAYLOAD='{
      "name": "{{ .Values.thunder.bootstrap.ampConsoleClient.name }}",
      "description": "{{ .Values.thunder.bootstrap.ampConsoleClient.description }}",
      "logoUrl": "{{ .Values.thunder.bootstrap.ampConsoleClient.logoUrl }}",
      "ouId": "'${DEFAULT_OU_ID}'",
      "authFlowId": "'${AUTH_FLOW_ID}'",
      "themeId": "'${CONSOLE_THEME_ID}'",
      "layoutId": "'${CONSOLE_LAYOUT_ID}'",
      "allowedUserTypes": {{ .Values.thunder.bootstrap.ampConsoleClient.allowedUserTypes | toJson }},
      "inboundAuthConfig": [
        {
          "type": "oauth2",
          "config": {
            "clientId": "{{ .Values.thunder.bootstrap.ampConsoleClient.clientId }}",
            "redirectUris": {{ .Values.thunder.bootstrap.ampConsoleClient.redirectUris | toJson }},
            "grantTypes": {{ .Values.thunder.bootstrap.ampConsoleClient.grantTypes | toJson }},
            "responseTypes": {{ .Values.thunder.bootstrap.ampConsoleClient.responseTypes | toJson }},
            "tokenEndpointAuthMethod": "{{ .Values.thunder.bootstrap.ampConsoleClient.tokenEndpointAuthMethod }}",
            "pkceRequired": {{ .Values.thunder.bootstrap.ampConsoleClient.pkceRequired }},
            "publicClient": {{ .Values.thunder.bootstrap.ampConsoleClient.publicClient }},
            "token": {
              "accessToken": {
                "validityPeriod": {{ .Values.thunder.bootstrap.ampConsoleClient.accessTokenValidityPeriod }},
                "userAttributes": {{ .Values.thunder.bootstrap.ampConsoleClient.userAttributes | toJson }}
              },
              "idToken": {
                "validityPeriod": {{ .Values.thunder.bootstrap.ampConsoleClient.idTokenValidityPeriod }},
                "userAttributes": {{ .Values.thunder.bootstrap.ampConsoleClient.userAttributes | toJson }}
              }
            }
          }
        }
      ]
    }'

    if echo "$BODY" | grep -q '"clientId":"{{ .Values.thunder.bootstrap.ampConsoleClient.clientId }}"'; then
      app_id=$(echo "$BODY" | sed 's/},{/}\n{/g' | grep '"clientId":"{{ .Values.thunder.bootstrap.ampConsoleClient.clientId }}"' | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
      log_info "Application '{{ .Values.thunder.bootstrap.ampConsoleClient.name }}' already exists (id: $app_id), updating..."
      RESPONSE=$(thunder_api_call PUT "/applications/$app_id" "$APP_PAYLOAD")
