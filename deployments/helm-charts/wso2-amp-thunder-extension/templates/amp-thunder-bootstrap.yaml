        log_error "Failed to update application (HTTP $HTTP_CODE)"
        echo "Response: ${RESPONSE%???}"
        exit 1
      fi
    else
      log_info "Application '{{  .Values.thunder.bootstrap.amMcpClient.name }}' does not exist, creating..."
      RESPONSE=$(thunder_api_call POST "/applications" "$APP_PAYLOAD")
      HTTP_CODE="${RESPONSE: -3}"
      if [[ "$HTTP_CODE" == "201" ]] || [[ "$HTTP_CODE" == "200" ]]; then
        log_info "Application '{{  .Values.thunder.bootstrap.amMcpClient.name }}' created successfully"
      elif [[ "$HTTP_CODE" == "409" ]]; then
        log_info "Application '{{  .Values.thunder.bootstrap.amMcpClient.name }}' already exists, skipping"
      else
        log_error "Failed to create application (HTTP $HTTP_CODE)"
        echo "Response: ${RESPONSE%???}"
        exit 1
      fi
    fi
