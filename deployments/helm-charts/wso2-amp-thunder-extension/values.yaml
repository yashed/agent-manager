# Thunder subchart configuration
thunder:
  deployment:
    replicaCount: 1
    strategy:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
    securityContext:
      # Read-only root filesystem. Must be false for SQLite
      readOnlyRootFilesystem: false
      enableRunAsUser: true
      fsGroup: 10001
      runAsUser: 10001
      seccompProfile:
        enabled: true
        type: RuntimeDefault
    terminationGracePeriodSeconds: 10
    image:
      registry: ghcr.io/asgardeo
      repository: thunder
      tag: "0.34.0"
      pullPolicy: Always
    container:
      port: 8090
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
  persistence:
    enabled: false
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi
    annotations: {}
  service:
    port: 8090
  serviceAccount:
    name: thunder-service-account
    create: true
  hpa:
    enabled: false
  pdb:
    minAvailable: "50%"
  ingress:
    enabled: false
  ocIngress:
    hostname: "thunder.amp.localhost"
  configuration:
    server:
      port: 8090
      httpOnly: true
      publicUrl: "http://thunder.amp.localhost:8080"
    gateClient:
      hostname: "thunder.amp.localhost"
      port: 8080
      scheme: "http"
      path: "/gate"
    crypto:
      encryption:
        key: "file://repository/resources/security/crypto.key"
      passwordHashing:
        algorithm: "PBKDF2"
        argon2id:
          iterations: 2
          memory: 19456
          parallelism: 1
          key_size: 32
          salt_size: 16
        pbkdf2:
          iterations: 600000
          key_size: 32
          salt_size: 16
        sha256:
          salt_size: 16
      keys:
        - id: "default-key"
          certFile: "repository/resources/security/signing.cert"
          keyFile: "repository/resources/security/signing.key"
    database:
      config:
        type: sqlite
        sqlite:
          path: "repository/database/configdb.db"
          options: "_journal_mode=WAL&_busy_timeout=5000&_pragma=foreign_keys(1)"
          max_open_conns: 500
          max_idle_conns: 100
          conn_max_lifetime: 3600
      runtime:
        type: sqlite
        sqlite:
          path: "repository/database/runtimedb.db"
          options: "_journal_mode=WAL&_busy_timeout=5000&_pragma=foreign_keys(1)"
          max_open_conns: 500
          max_idle_conns: 100
          conn_max_lifetime: 3600
      user:
        type: sqlite
        sqlite:
          path: "repository/database/userdb.db"
          options: "_journal_mode=WAL&_busy_timeout=5000&_pragma=foreign_keys(1)"
          max_open_conns: 500
          max_idle_conns: 100
          conn_max_lifetime: 3600
    cache:
      disabled: false
      type: "inmemory"
      size: 1000
      ttl: 3600
      evictionPolicy: "LRU"
      cleanupInterval: 300
    jwt:
      issuer: "http://thunder.amp.localhost:8080"
      validityPeriod: 3600
      audience: "application"
      preferredKeyId: "default-key"
    oauth:
      refreshToken:
        renewOnGrant: false
        validityPeriod: 86400
      authorizationCode:
        validityPeriod: 600
      dcr:
        insecure: false
    consent:
      enabled: true
      baseUrl: "http://localhost:9090/api/v1"
      timeout: 5
      maxRetries: 3
      server:
        port: 9090
        hostname: "localhost"
      database:
        type: sqlite
        sqlitePath: "repository/database/consentdb.db"
        sqliteOptions: "_pragma=journal_mode(WAL)&_pragma=cache_size(-16000)"
    cors:
      allowedOrigins:
        - "http://localhost:3000"
  setup:
    enabled: true
    backoffLimit: 3
    ttlSecondsAfterFinished: 86400
    preserveJob: true
    debug: false
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 250m
        memory: 128Mi
  bootstrap:
    enabled: true
    # Full list of AMP OAuth2 scopes that interactive clients are allowed to request.
    # Thunder only grants scopes that appear in an app's registered scope list, so all
    # permission scopes must be declared here for role-based access to work.
    ampScopes:
      - "openid"
      - "profile"
      - "email"
      - "org:view"
      - "org:modify-settings"
      - "org:invite-member"
      - "org:remove-member"
      - "org:assign-role"
      - "org:manage-idp"
      - "org:manage-service-account"
      - "project:create"
      - "project:read"
      - "project:update"
      - "project:delete"
      - "environment:create"
      - "environment:read"
      - "environment:update"
      - "environment:delete"
      - "gateway:create"
      - "gateway:read"
      - "gateway:update"
      - "gateway:delete"
      - "gateway:token:manage"
      - "data-plane:read"
      - "deployment-pipeline:read"
      - "git-secret:create"
      - "git-secret:read"
      - "git-secret:delete"
      - "llm-provider-template:create"
      - "llm-provider-template:read"
      - "llm-provider-template:update"
      - "llm-provider-template:delete"
      - "llm-provider:create"
      - "llm-provider:read"
      - "llm-provider:update"
      - "llm-provider:delete"
      - "llm-provider:configure-guardrail"
      - "llm-provider:connect"
      - "llm-provider:deploy"
      - "llm-provider:api-key:manage"
      - "mcp-server:create"
      - "mcp-server:read"
      - "mcp-server:update"
      - "mcp-server:delete"
      - "mcp-server:configure-guardrail"
      - "mcp-server:connect"
      - "llm-proxy:create"
      - "llm-proxy:read"
      - "llm-proxy:update"
      - "llm-proxy:delete"
      - "llm-proxy:deploy"
      - "llm-proxy:api-key:manage"
      - "evaluator:create"
      - "evaluator:read"
      - "evaluator:update"
      - "evaluator:delete"
      - "agent:create"
      - "agent:read"
      - "agent:update"
      - "agent:delete"
      - "agent:build"
      - "agent:deploy:non-production"
      - "agent:deploy:production"
      - "agent:promote"
      - "agent:rollback"
      - "agent:suspend"
      - "agent:token:manage"
      - "agent:api-key:manage"
      - "agent-kind:read"
      - "agent-kind:create"
      - "agent-kind:update"
      - "agent-kind:delete"
      - "monitor:create"
      - "monitor:read"
      - "monitor:update"
      - "monitor:delete"
      - "monitor:execute"
      - "monitor:score:read"
      - "monitor:score:publish"
      - "observability:org-dashboard"
      - "observability:project-dashboard"
      - "observability:guardrail-metric"
      - "observability:infra-metric"
      - "role:create"
      - "role:read"
      - "role:update"
      - "role:delete"
      - "group:create"
      - "group:read"
      - "group:update"
      - "group:delete"
      - "catalog:read"
      - "repository:read"
    configMap:
      name: amp-thunder-bootstrap
      files:
        - 50-amp-api-client.sh
        - 51-user-schema-and-users.sh
        - 52-amp-console-branding.sh
        - 53-amp-console-app.sh
        - 54-workload-publisher-app.sh
        - 55-observer-resource-reader-app.sh
        - 56-amp-publisher-client.sh
        - 57-amp-system-client.sh
        - 58-amctl-client.sh
        - 59-am-mcp-client.sh
        - 60-amp-resource-server.sh
        - 61-amp-default-roles.sh
    # Observer Resource Reader Client configuration (for observability plane to read resources)
    observerResourceReaderClient:
      clientId: "openchoreo-observer-resource-reader-client" # clusterauthzrolebinding is already created with this clientId by openchoreo, so it should not be changed unless the corresponding ClusterAuthzRoleBinding is also updated
      clientSecret: "openchoreo-observer-resource-reader-client-secret"
      name: "OpenChoreo Observer Resource Reader"
      description: "OpenChoreo Observer Resource Reader Client for reading resources from control plane"
      grantTypes:
        - "client_credentials"
      tokenEndpointAuthMethod: "client_secret_post"
      pkceRequired: false
      publicClient: false
      accessTokenValidityPeriod: 3600
    # Workload Publisher Client configuration (for CI workflows to create workloads)
    workloadPublisherClient:
      clientId: "openchoreo-workload-publisher-client" # clusterauthzrolebinding is already created with this clientId by openchoreo, so it should not be changed unless the corresponding ClusterAuthzRoleBinding is also updated
      clientSecret: "openchoreo-workload-publisher-secret"
      name: "Workload Publisher"
      description: "OpenChoreo Workload Publisher Client for creating workloads from CI workflows"
      grantTypes:
        - "client_credentials"
      tokenEndpointAuthMethod: "client_secret_post"
      pkceRequired: false
      publicClient: false
      accessTokenValidityPeriod: 3600
    # AMP API Client configuration
    ampApiClient:
      clientId: "amp-api-client"
      clientSecret: "amp-api-client-secret"
      name: "AMP API Client"
      description: "Client application for AMP API access"
      grantTypes:
        - "client_credentials"
      tokenEndpointAuthMethod: "client_secret_basic"
      pkceRequired: false
      publicClient: false
      accessTokenValidityPeriod: 3600
    # AMP System Client configuration (for agent-manager to provision per-org OAuth apps via Thunder admin API)
    # WARNING: clientSecret below is a LOCAL-DEVELOPMENT-ONLY placeholder.
    # In production, override ampSystemClient.clientSecret via a Kubernetes Secret
    # or external secret manager. Deploying with this default value is insecure.
    ampSystemClient:
      clientId: "amp-system-client"
      clientSecret: "amp-system-client-secret"
      name: "AMP System Client"
      description: "System client for agent-manager to provision per-org OAuth apps"
      grantTypes:
        - "client_credentials"
      tokenEndpointAuthMethod: "client_secret_basic"
      pkceRequired: false
      publicClient: false
      accessTokenValidityPeriod: 3600
    # AMP Publisher Client configuration (for evaluation job to publish scores)
    ampPublisherClient:
      clientId: "amp-publisher-client"
      clientSecret: "amp-publisher-client-secret"  # Override in production; must match the value stored in OpenBao at secret/amp-publisher-client-secret (used by ExternalSecret at workflow runtime)
      name: "AMP Publisher Client"
      description: "Client application for evaluation job to publish scores"
      grantTypes:
        - "client_credentials"
      tokenEndpointAuthMethod: "client_secret_basic"
      pkceRequired: false
      publicClient: false
      accessTokenValidityPeriod: 3600
    # AMP CLI Client configuration (public PKCE client for interactive login)
    amCliClient:
      clientId: "amctl"
      name: "AMCTL"
      description: "AMP CLI application for interactive user login"
      redirectUris:
        - "http://127.0.0.1:10325/callback"
      grantTypes:
        - "authorization_code"
        - "refresh_token"
      responseTypes:
        - "code"
      allowedUserTypes:
        - "engineer"
      tokenEndpointAuthMethod: "none"
      pkceRequired: true
      publicClient: true
      accessTokenValidityPeriod: 3600
      idTokenValidityPeriod: 3600
      userAttributes:
        - "given_name"
        - "family_name"
        - "email"
        - "username"
        - "groups"
        - "ouId"
        - "ouHandle"
    # AMP MCP Client configuration (public PKCE client for interactive login)
    amMcpClient:
      clientId: "am-mcp"
      name: "AMP MCP"
      description: "AMP MCP application for interactive user login"
      redirectUris:
        - "http://127.0.0.1:33418/callback"
        - "http://localhost:33418/callback"
      grantTypes:
        - "authorization_code"
        - "refresh_token"
      responseTypes:
        - "code"
      allowedUserTypes:
        - "engineer"
      tokenEndpointAuthMethod: "none"
      pkceRequired: true
      publicClient: true
      accessTokenValidityPeriod: 3600
      idTokenValidityPeriod: 3600
      userAttributes:
        - "given_name"
        - "family_name"
        - "email"
        - "username"
        - "groups"
        - "ouId"
        - "ouHandle"
    # AMP Console Client configuration
    ampConsoleClient:
      clientId: "amp-console-client"
      clientSecret: "amp-console-client-secret"
      name: "AMP Console"
      description: "AMP Console Application"
      logoUrl: "https://wso2.cachefly.net/wso2/sites/all/image_resources/logos/WSO2-Pulse-Orange.webp"
      redirectUris:
        - "http://localhost:3000/login"
      grantTypes:
        - "authorization_code"
        - "refresh_token"
      responseTypes:
        - "code"
      allowedUserTypes:
        - "engineer"
      tokenEndpointAuthMethod: "none"
      pkceRequired: true
      publicClient: true
      accessTokenValidityPeriod: 3600
      idTokenValidityPeriod: 3600
      userAttributes:
        - "given_name"
        - "family_name"
        - "email"
        - "username"
        - "groups"
        - "ouId"
        - "ouHandle"

    # Agent Manager Console Theme (applied to amp-console-client sign-in page)
    ampConsoleTheme:
      handle: "wso2-agent-manager-console"
      displayName: "WSO2 Agent Manager Console Theme"
      theme:
        direction: "ltr"
        defaultColorScheme: "light"
        shape:
          borderRadius: 8
        typography:
          fontFamily: "Inter Variable, sans-serif"
          h1:
            fontSize: "1.75rem"
            fontWeight: 600
            lineHeight: 1.3
        colorSchemes:
          light:
            colors:
              primary:
                main: "#fa7b3f"
                dark: "#e74420"
                contrastText: "#ffffff"
              secondary:
                main: "#1a1a2e"
                dark: "#0d0d1a"
                contrastText: "#ffffff"
              background:
                default: "#f7f8fb"
                paper: "#ffffff"
              text:
                primary: "#000000"
                secondary: "#494848"
          dark:
            colors:
              primary:
                main: "#fa7b3f"
                dark: "#e74420"
                contrastText: "#ffffff"
              secondary:
                main: "#ff9966"
                dark: "#fa7b3f"
                contrastText: "#000000"
              background:
                default: "#121212"
                paper: "#1e1e1e"
              text:
                primary: "#ffffff"
                secondary: "#cccccc"
    # Agent Manager Console Layout (split-screen sign-in page for amp-console-client)
    ampConsoleLayout:
      id: "0e0dc039-bae9-4563-82b9-ee4e76f9a58c"
      handle: "wso2-agent-manager-console"
      displayName: "WSO2 Agent Manager Console Layout"
      layout:
        head:
          stylesheets:
            - id: "wso2-agent-manager-console-overrides"
              type: "inline"
              content: |
                body { background: #fafafa !important; min-height: 100vh !important; margin: 0 !important; }
                [data-color-scheme="dark"] body { background: #0b0b0f !important; }
                body { display: grid !important; grid-template-columns: 1fr !important; align-items: stretch !important; }
                body::before { display: none; }
                @media (min-width: 900px) {
                  body { grid-template-columns: minmax(380px, 1fr) minmax(420px, 1fr) !important; }
                  body::before { content: ""; display: block; background-color: #0a0a0e; background-image: radial-gradient(800px 400px at 0% 0%, rgba(250,123,63,0.18), transparent 60%), url("https://wso2.cachefly.net/wso2/sites/all/image_resources/wso2-agent-manager-auth-marketing-dark.svg"); background-position: top left, center center; background-repeat: no-repeat, no-repeat; background-size: auto, min(540px, calc(100% - 96px)) auto; }
                  [data-color-scheme="light"] body::before { background-color: #f3f4f6; background-image: radial-gradient(800px 400px at 0% 0%, rgba(250,123,63,0.10), transparent 60%), url("https://wso2.cachefly.net/wso2/sites/all/image_resources/wso2-agent-manager-auth-marketing-light.svg"); }
                }
                .MuiPaper-root { max-width: 420px !important; width: 100% !important; margin: auto !important; padding: 40px 36px !important; border-radius: 16px !important; background-color: #ffffff !important; box-shadow: 0 1px 2px rgba(15,23,42,0.04), 0 12px 40px rgba(15,23,42,0.08) !important; border: 1px solid rgba(15,23,42,0.06) !important; }
                [data-color-scheme="dark"] .MuiPaper-root { background-color: #14141a !important; box-shadow: 0 1px 2px rgba(0,0,0,0.4), 0 16px 48px rgba(0,0,0,0.55) !important; border-color: rgba(255,255,255,0.08) !important; }
                img[alt*="logo" i], img[src*="logo" i] { display: block !important; max-height: 56px !important; width: auto !important; margin: 0 auto 28px !important; }
                .Text--h1, .MuiTypography-h1, h1.MuiTypography-root { display: block !important; text-align: center !important; font-size: 1.5rem !important; line-height: 1.3 !important; font-weight: 600 !important; letter-spacing: -0.01em !important; color: #111827 !important; margin: 0 0 4px !important; }
                [data-color-scheme="dark"] .Text--h1, [data-color-scheme="dark"] .MuiTypography-h1, [data-color-scheme="dark"] h1.MuiTypography-root { color: #f5f5f7 !important; }
                .Text--body1, .MuiTypography-body1 { text-align: center !important; font-size: 0.9375rem !important; color: rgba(15,23,42,0.6) !important; margin: 0 0 8px !important; line-height: 1.5 !important; }
                [data-color-scheme="dark"] .Text--body1, [data-color-scheme="dark"] .MuiTypography-body1 { color: rgba(255,255,255,0.6) !important; }
                .MuiPaper-root .ThunderFormControl--root { margin-top: 0 !important; margin-bottom: 0 !important; }
                .MuiPaper-root .ThunderLabel--root { font-size: 0.8125rem !important; font-weight: 500 !important; margin-bottom: 6px !important; color: rgba(15,23,42,0.7) !important; }
                [data-color-scheme="dark"] .MuiPaper-root .ThunderLabel--root { color: rgba(255,255,255,0.7) !important; }
                .MuiPaper-root .ThunderTextField--root .MuiOutlinedInput-root { border-radius: 10px !important; font-size: 0.9375rem !important; }
                .MuiPaper-root .ThunderTextField--root .MuiOutlinedInput-input { padding: 11px 14px !important; height: auto !important; }
                .MuiPaper-root .ThunderFlow--richText:not(:last-child) { margin: 4px 0 8px !important; padding: 8px 10px !important; font-size: 0.75rem !important; line-height: 1.45 !important; color: rgba(15,23,42,0.55) !important; text-align: center !important; background: rgba(15,23,42,0.04) !important; border-radius: 8px !important; }
                [data-color-scheme="dark"] .MuiPaper-root .ThunderFlow--richText:not(:last-child) { color: rgba(255,255,255,0.55) !important; background: rgba(255,255,255,0.04) !important; }
                .MuiPaper-root .MuiStack-root, .MuiPaper-root [class*="BlockStack"], .MuiPaper-root form { gap: 12px !important; margin-top: 28px !important; }
                .MuiButton-root { width: 100% !important; border-radius: 10px !important; text-transform: none !important; font-weight: 500 !important; font-size: 0.9375rem !important; padding: 11px 16px !important; height: 44px !important; justify-content: center !important; gap: 10px !important; box-shadow: none !important; transition: transform 120ms ease, box-shadow 160ms ease, background-color 160ms ease, border-color 160ms ease !important; }
                .MuiPaper-root .ThunderFlow--triggerButton:nth-of-type(1)::before { content: ""; display: inline-block; width: 18px; height: 18px; background: center/contain no-repeat url("https://www.gstatic.com/images/branding/googleg/1x/googleg_standard_color_128dp.png"); flex: 0 0 18px; }
                .MuiPaper-root .ThunderFlow--triggerButton:nth-of-type(2)::before { content: ""; display: inline-block; width: 18px; height: 18px; background: center/contain no-repeat url("https://upload.wikimedia.org/wikipedia/commons/9/91/Octicons-mark-github.svg"); flex: 0 0 18px; }
                .MuiPaper-root .MuiButton-root { background-color: #ffffff !important; color: rgba(0,0,0,0.87) !important; border: 1px solid rgba(0,0,0,0.12) !important; box-shadow: 0 1px 2px rgba(0,0,0,0.08) !important; }
                .MuiPaper-root .MuiButton-root:hover { background-color: #f8f9fa !important; box-shadow: 0 2px 6px rgba(0,0,0,0.12) !important; transform: translateY(-1px) !important; }
                [data-color-scheme="dark"] .MuiPaper-root .MuiButton-root { border-color: rgba(255,255,255,0.18) !important; }
                [data-color-scheme="dark"] .MuiPaper-root .MuiButton-root:hover { background-color: #f1f3f4 !important; }
                .MuiButton-outlined, .MuiButton-contained { box-shadow: inherit !important; }
                .MuiPaper-root .ThunderFlow--richText:last-child { margin-top: 28px !important; padding-top: 20px !important; border-top: 1px solid rgba(15,23,42,0.06) !important; font-size: 0.75rem !important; line-height: 1.5 !important; color: rgba(15,23,42,0.5) !important; text-align: center !important; margin-bottom: 0 !important; }
                .MuiPaper-root .ThunderFlow--richText:last-child a { color: rgba(15,23,42,0.7) !important; text-decoration: underline !important; text-underline-offset: 2px !important; font-size: inherit !important; }
                .MuiPaper-root .ThunderFlow--richText:last-child a:hover { color: #fa7b3f !important; }
                [data-color-scheme="dark"] .MuiPaper-root .ThunderFlow--richText:last-child { border-top-color: rgba(255,255,255,0.08) !important; color: rgba(255,255,255,0.45) !important; }
                [data-color-scheme="dark"] .MuiPaper-root .ThunderFlow--richText:last-child a { color: rgba(255,255,255,0.65) !important; }
                [data-color-scheme="dark"] .MuiPaper-root .ThunderFlow--richText:last-child a:hover { color: #fa7b3f !important; }
        screens:
          signin:
            title: "Sign In"
            layout: "split"
          signup:
            title: "Create your WSO2 Cloud account"
            layout: "split"
          common:
            layout: "split"
    # Default Organization unit configuration
    organizationUnit:
      name: "Default"
      handle: "default"
      description: "Default organizational unit"
    # User schema configuration
    userSchema:
      name: "engineer"
      allowSelfRegistration: true
    # Default admin user configuration
    defaultUsers:
      - username: "amp-admin"
        password: "amp-admin"
        givenName: "Admin"
        familyName: "User"
        groups: ["platformEngineer"]
