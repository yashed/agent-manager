{{- if .Values.console.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-management-platform.console.fullname" . }}
  labels:
    {{- include "agent-management-platform.console.labels" . | nindent 4 }}
data:
  # Authentication configuration
  AUTH_CLIENT_ID: {{ .Values.console.config.auth.clientId | quote }}
  AUTH_BASE_URL: {{ .Values.console.config.auth.baseUrl | quote }}
  AUTH_SCOPES: {{ .Values.console.config.auth.scopes | default "openid profile email" | quote }}
  SIGN_IN_REDIRECT_URL: {{ .Values.console.config.auth.signInRedirectURL | quote }}
  SIGN_OUT_REDIRECT_URL: {{ .Values.console.config.auth.signOutRedirectURL | quote }}
  VALIDATE_ID_TOKEN: {{ .Values.console.config.auth.validateIDToken | quote }}
  CLOCK_TOLERANCE: {{ .Values.console.config.auth.clockTolerance | quote }}
  # Disable authentication flag
  DISABLE_AUTH: {{ .Values.console.config.disableAuth | quote }}
  # Backend API URL (auto-configure if empty)
  API_BASE_URL: {{ .Values.console.config.apiBaseUrl | quote }}
  # Traces Observer Service URL (direct browser → traces-observer calls)
  OBS_API_BASE_URL: {{ .Values.console.config.obsApiBaseUrl | default "" | quote }}
  # Gateway control plane URL for gateway setup commands
  GATEWAY_CONTROL_PLANE_URL: {{ .Values.console.config.gatewayControlPlaneUrl | default "http://localhost:9243" | quote }}
  # Gateway version for setup commands
  GATEWAY_VERSION: {{ .Values.console.config.gatewayVersion | default "v1.0.0" | quote }}
  # Agent Instrumentation URL
  INSTRUMENTATION_URL: {{ .Values.console.config.instrumentationUrl | quote }}
  # Guardrails configuration
  GUARDRAILS_CATALOG_URL: {{ .Values.console.config.guardrailsCatalogUrl | default "" | quote }}
  GUARDRAILS_DEFINITION_BASE_URL: {{ .Values.console.config.guardrailsDefinitionBaseUrl | default "" | quote }}
  # Guardrail capability flags — enable policies that require external system configuration
  GUARDRAIL_CAP_AWS_BEDROCK: {{ dig "guardrailCapabilities" "awsBedrock" false .Values.console.config | quote }}
  GUARDRAIL_CAP_AZURE_CONTENT_SAFETY: {{ dig "guardrailCapabilities" "azureContentSafety" false .Values.console.config | quote }}
  GUARDRAIL_CAP_GRANITE_GUARDIAN: {{ dig "guardrailCapabilities" "graniteGuardian" false .Values.console.config | quote }}
  GUARDRAIL_CAP_NEMO_GUARD: {{ dig "guardrailCapabilities" "nemoGuard" false .Values.console.config | quote }}
  GUARDRAIL_CAP_SEMANTIC_GUARDRAILS: {{ dig "guardrailCapabilities" "semanticGuardrails" false .Values.console.config | quote }}
{{- end }}
