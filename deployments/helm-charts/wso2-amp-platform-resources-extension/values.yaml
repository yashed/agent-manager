# Default values for wso2-amp-platform-resources
# This chart creates default OpenChoreo resources needed for the AI Agent Management Platform
# All those resources are created in default namespace

# Global configuration
global:
  # -- OAuth / IDP configuration for workload publishing
  oauth:
    # -- OAuth token endpoint URL
    tokenUrl: "http://host.k3d.internal:8080/oauth2/token"
    # -- Host header for OAuth requests
    hostHeader: "thunder.amp.localhost"
    # -- OAuth client ID for workload publisher
    clientId: "openchoreo-workload-publisher-client"

  # -- OpenChoreo API server configuration
  apiServer:
    # -- API server URL
    url: "http://host.k3d.internal:8080"
    # -- Host header for API server requests
    hostHeader: "api.openchoreo.localhost"

  # -- Common labels to add to every resource.
  commonLabels: {}
  # -- Base domain for external access (e.g., "openchoreo.example.com")
  # When set, registry will be accessible at registry.<baseDomain>
  baseDomain: ""
  # -- Container registry configuration
  registry:
    # -- Registry endpoint for pushing and pulling images
    # For local registry: "host.k3d.internal:10082"
    # For external registry with baseDomain: automatically uses "registry.<baseDomain>"
    endpoint: "host.k3d.internal:10082"

  # -- Default resources configuration
  defaultResources:
    # -- Namespace where default resources will be created
    namespace: default
    # -- Registry configuration for default resources
    registry:
      # -- Enable TLS verification for registry connections
      tlsVerify: false

    # -- Buildpack cache configuration
    buildpackCache:
      # @schema
      # type: boolean
      # description: Enable buildpack image caching. When enabled, images are pulled from cache registry instead of remote.
      # default: false
      # @schema
      enabled: false

      # @schema
      # type: array
      # description: List of buildpack images to cache. Each entry has an id for lookup, remoteImage for external registry, and cachedImage for local cache.
      # items:
      #   type: object
      #   additionalProperties: false
      #   required:
      #     - id
      #     - remoteImage
      #     - cachedImage
      #   properties:
      #     id:
      #       type: string
      #       description: Unique identifier for lookup in workflow templates
      #     remoteImage:
      #       type: string
      #       description: Image reference from remote registry (used when caching is disabled)
      #     cachedImage:
      #       type: string
      #       description: Image path in the local build plane registry (used when caching is enabled)
      # @schema
      images:
        - id: "lifecycle"
          remoteImage: "docker.io/buildpacksio/lifecycle:0.20.5"
          cachedImage: "buildpacks-cache/lifecycle:0.20.5"
        - id: "google-builder"
          remoteImage: "gcr.io/buildpacks/builder@sha256:5977b4bd47d3e9ff729eefe9eb99d321d4bba7aa3b14986323133f40b622aef1"
          cachedImage: "buildpacks-cache/google-builder:latest"
        - id: "google-run"
          remoteImage: "gcr.io/buildpacks/google-22/run:latest"
          cachedImage: "buildpacks-cache/google-run:latest"
        - id: "ballerina-builder"
          remoteImage: "ghcr.io/openchoreo/buildpack/ballerina:18"
          cachedImage: "buildpacks-cache/ballerina-builder:18"
        - id: "ballerina-run"
          remoteImage: "ghcr.io/openchoreo/buildpack/ballerina:18-run"
          cachedImage: "buildpacks-cache/ballerina-run:18"

# Kubectl image configuration for jobs
kubectl:
  image: bitnamilegacy/kubectl:1.32.4

# Environment configuration
environment:
  # Name of the default environment
  name: default
  # Display name for the environment
  displayName: "Default"
  # Description for the environment
  description: "Default environment for WSO2 AI Agent Management Platform"
  # Is this environment critical/production?
  isCritical: false
  # DNS Prefix for the gateway
  dnsPrefix: "default"

# Deployment Pipeline configuration
deploymentPipeline:
  # Name of the default deployment pipeline
  name: default
  # Display name for the deployment pipeline
  displayName: "Default Deployment Pipeline"
  # Description for the deployment pipeline
  description: "Default deployment pipeline for WSO2 Agent Manager"
  # Promotion order for the deployment pipeline
  promotionOrder:
    - sourceEnvironmentRef:
        name: default
      targetEnvironmentRefs: []

# Project configuration
project:
  # Name of the default project
  name: default
  # Display name for the project
  displayName: "Default Project"
  # Description for the project
  description: "Default project for WSO2 Agent Manager"

# External Secrets configuration
externalSecrets:
  # Name of the ClusterSecretStore (uses the default OpenBao ClusterSecretStore)
  clusterSecretStoreName: default

# Authorization configuration for OpenChoreo
authz:
  # AMP API Client authorization binding
  ampApiClient:
    # Client ID used by agent-manager-service (must match Thunder OAuth client_id)
    clientId: amp-api-client
    # Role to assign (admin grants full access to OpenChoreo APIs)
    role: admin

# Gateway TLS certificate configuration
gatewayTls:
  # Enable gateway TLS certificate creation
  enabled: true
  # Certificate name
  certificateName: gateway-tls
  # Secret name where the certificate will be stored
  secretName: gateway-tls
  # Namespace where the certificate and secret will be created
  namespace: openchoreo-data-plane
  # Certificate duration (default: 2160h = 90 days)
  duration: 2160h
  # Certificate renewal time (default: 720h = 30 days before expiry)
  renewBefore: 720h
  # Common name for the certificate
  commonName: "*.openchoreoapis.localhost"
  # DNS names for the certificate
  dnsNames:
    - "*.openchoreoapis.localhost"
    - "openchoreoapis.localhost"
  # Issuer reference for cert-manager
  issuerRef:
    # Name of the issuer (created by openchoreo-data-plane chart)
    name: openchoreo-data-plane-selfsigned-issuer
    # Issuer kind: Issuer or ClusterIssuer
    kind: Issuer
