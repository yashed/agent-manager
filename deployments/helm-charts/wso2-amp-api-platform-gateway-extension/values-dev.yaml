# Development overrides for local k3d setup with agent-manager in docker-compose.
# Gateway pods reach agent-manager via host.docker.internal (docker-compose
# publishes 9000:8080 and 9243:9243 on the host). This avoids the k3d-bridge
# WebSocket flap seen when connecting directly to the agent-manager-service
# container name.
#
# Note: agentManager.apiUrl and apiGateway.controlPlane.host are passed via
# --set in setup-gateway.sh, not here.

apiGateway:
  controlPlane:
    tls:
      insecureSkipVerify: true
  config:
    policyConfigurations:
      jwtauth_v1:
        keymanagers:
        - name: agent-manager-service
          issuer: agent-manager-service
          jwks:
            remote:
              uri: http://host.docker.internal:9000/auth/external/jwks.json
              skipTlsVerify: true
        - name: ThunderKeyManager
          issuer: http://thunder.amp.localhost:8080
          jwks:
            remote:
              uri: http://amp-thunder-extension-service.amp-thunder:8090/oauth2/jwks
              skipTlsVerify: true
