---
# ConfigMap containing Helm values for the gateway stack deployed by the gateway-operator.
# Referenced by the APIGateway CR via spec.configRef.name.
# The gateway-operator reads values.yaml from this ConfigMap and uses it when
# running helm install/upgrade for the gateway-controller + router + policy-engine.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wso2-amp-gateway-extension.configMapName" . }}
  namespace: {{ .Values.apiGateway.namespace }}
  labels:
    {{- include "wso2-amp-gateway-extension.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway-config
data:
  values.yaml: |
    gateway:
      developmentMode: {{ .Values.developmentMode }}
      config:
        controller:
          server:
            api_port: 9090
            xds_port: 18000
            shutdown_timeout: 15s
            gateway_id: "platform-gateway-id"
          policy_server:
            port: 18001
            tls:
              enabled: false
          storage:
            type: sqlite
            sqlite:
              path: ./data/gateway.db
          controlplane:
            insecure_skip_verify: {{ .Values.apiGateway.controlPlane.tls.insecureSkipVerify | default true }}
            reconnect_initial: 1s
            reconnect_max: 5m
            polling_interval: 15m
            deployment_push_enabled: false
            sync_batch_size: 50
          logging:
            level: info
            format: json
        router:
          gateway_host: "*"
          listener_port: 22893
          https_enabled: true
          https_port: 22894
          access_logs:
            enabled: true
            format: json
          policy_engine:
            mode: uds
            timeout_ms: 60000
            failure_mode_allow: false
            route_cache_action: RETAIN
            allow_mode_override: true
            message_timeout_ms: 60000
            tls:
              enabled: false
          logging:
            level: info
            format: json
        policy_engine:
          server:
            extproc_port: 9001
          admin:
            enabled: true
            port: 9002
          config_mode:
            mode: xds
          xds:
            connect_timeout: 10s
            request_timeout: 5s
            initial_reconnect_delay: 1s
            max_reconnect_delay: 60s
            tls:
              enabled: false
          logging:
            level: info
            format: json
        {{- if .Values.apiGateway.config.policyConfigurations }}
        policy_configurations:
          {{- .Values.apiGateway.config.policyConfigurations | toYaml | nindent 10 }}
        {{- end }}

      controller:
        controlPlane:
          host: {{ .Values.apiGateway.controlPlane.host | quote }}
          {{- if .Values.apiGateway.controlPlane.tls.enabled }}
          port: 9243
          {{- else }}
          port: 9000
          {{- end }}
          token:
            value: ""
            secretName: {{ include "wso2-amp-gateway-extension.tokenSecretName" . | quote }}
            key: {{ .Values.gateway.tokenSecret.key | quote }}
        tls:
          enabled: true
          certificateProvider: cert-manager
          certManager:
            createIssuer: true
        storage:
          type: sqlite
          sqlitePath: ./data/gateway.db
        persistence:
          enabled: true
          size: 100Mi
        logging:
          level: info
        deployment:
          podSecurityContext:
            fsGroup: 10001
            runAsUser: 10001
            runAsGroup: 10001
            runAsNonRoot: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

      gatewayRuntime:
        deployment:
          podLabels:
            openchoreo.dev/system-component: gateway-runtime
          {{- if .Values.apiGateway.config.systemEnv }}
          extraEnv:
            {{- range $key, $value := .Values.apiGateway.config.systemEnv }}
            - name: {{ printf "APIP_GW_%s" ($key | upper | replace "_" "__") | quote }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
        service:
          type: LoadBalancer
          ports:
            http: 22893
            https: 22894
            envoyAdmin: 9901
            policyEngineAdmin: 9002
            policyEngineMetrics: 9003
