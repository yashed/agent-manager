# Default values for wso2-amp-api-platform-gateway-extension
# This chart bootstraps the API Platform Gateway registration in Agent Manager,
# then deploys the gateway via an APIGateway CR consumed by the gateway-operator.
#
# Flow:
#   1. Bootstrap Job (post-install hook):
#      - Gets JWT from Thunder IDP using amp-api-client credentials
#      - Registers the AI gateway in Agent Manager via REST API
#      - Generates a registration token and stores it in a K8s Secret
#   2. APIGateway CR (non-hook, picked up by gateway-operator):
#      - References the token Secret via spec.controlPlane.tokenSecretRef
#      - References a ConfigMap via spec.configRef for full Helm values
#      - Gateway operator deploys controller + router + policy-engine via Helm

# Kubectl image used in bootstrap job
kubectl:
  image: alpine/k8s:1.32.3

# Agent Manager API connection details (used by bootstrap job to register gateway)
agentManager:
  # Public API URL (port 8080 = JWT-authenticated API)
  apiUrl: "http://amp-api.wso2-amp.svc.cluster.local:9000/api/v1"
  # Organization name in Agent Manager (must match Thunder OU handle)
  orgName: "default"
  # Thunder IDP for obtaining a JWT to call Agent Manager API
  idp:
    tokenUrl: "http://amp-thunder-extension-service.amp-thunder.svc.cluster.local:8090/oauth2/token"
    clientId: "amp-api-client"
    clientSecret: "amp-api-client-secret" # Prefer existingSecret; only set this for local/dev use
    # Reference an existing secret for IDP credentials (recommended for production).
    # When set, clientId and clientSecret above are ignored.
    existingSecret: ""
    existingSecretClientIdKey: "client-id"
    existingSecretClientSecretKey: "client-secret"

# Gateway registration configuration
gateway:
  # Name of the AI gateway to register in Agent Manager (lowercase alphanumeric + hyphens).
  # Defaults to the Helm release name if empty.
  name: ""
  # Human-readable display name
  displayName: "Default API Platform Gateway"
  # Virtual host (FQDN or IP) that the gateway is reachable on
  vhost: "http://api-platform-gateway.amp.localhost:22893"
  # Gateway type: REGULAR, AI, or EVENT (must match GatewayType enum in Agent Manager API)
  type: "REGULAR"
  # Environment name in Agent Manager to associate this gateway with.
  # The bootstrap job looks up environments by this name.
  environment: "default"

  # The generated registration token is stored in this Kubernetes Secret.
  # It is then referenced by the APIGateway CR spec.controlPlane.tokenSecretRef.
  # Defaults to "<release-name>-token" if empty.
  tokenSecret:
    name: ""
    key: "token"

# APIGateway CR configuration (deployed by gateway-operator)
# Development mode: relaxes security checks (e.g. auto-generates encryption keys).
# Set to false in production and configure gateway.controller.encryptionKeys instead.
developmentMode: true

apiGateway:
  # Namespace where the APIGateway CR is created.
  # Must be the same namespace where the gateway-operator is watching.
  namespace: "openchoreo-data-plane"

  # API selector: which APIs this gateway handles
  apiSelector:
    scope: Cluster

  # Control plane connection: points to Agent Manager's gateway management port (9243)
  controlPlane:
    host: "amp-api-gateway-manager.wso2-amp.svc.cluster.local:9243"
    tls:
      enabled: true

  # ConfigMap containing full Helm values for the gateway Helm chart.
  # The gateway-operator reads this and passes it when deploying the gateway stack.
  config:
    # Name of the ConfigMap to create with gateway Helm values.
    # Defaults to "<release-name>-config" if empty.
    configMapName: ""
    # Helm chart version for the gateway (must match what gateway-operator is configured for)
    chartVersion: "1.1.0"

    # =========================================================================
    # Policy system parameter configurations
    # These are injected into the gateway's config.toml and resolved by policies
    # via ${config.*} expressions in their systemParameters definitions.
    # =========================================================================

    # Policy configurations rendered under [policy_configurations.*] in config.toml.
    # Consumed by policies that reference ${config.policy_configurations.<section>.<key>}.
    policyConfigurations:
      # --- Rate Limiting (shared by basic-ratelimit, advanced-ratelimit,
      #     token-based-ratelimit, llm-cost-based-ratelimit) ---
      ratelimit_v1:
        algorithm: "fixed-window" # "fixed-window" or "gcra"
        backend: "memory" # "memory" or "redis"
        memory:
          max_entries: 10000
          cleanup_interval: "5m"
        # redis:                     # Required when backend is "redis"
        #   host: "localhost"
        #   port: 6379
        #   password: ""
        #   username: ""
        #   db: 0
        #   key_prefix: "ratelimit:v1:"
        #   failure_mode: "open"     # "open" (allow) or "closed" (deny) on Redis failure
        #   connection_timeout: "5s"
        #   read_timeout: "3s"
        #   write_timeout: "3s"
        # headers:                   # advanced-ratelimit only
        #   include_x_rate_limit: true
        #   include_ietf: true
        #   include_retry_after: true

      # --- LLM Cost Based Rate Limiting (additional to ratelimit_v1) ---
      llm_cost_ratelimit_v1:
        cost_scale_factor: 1000000000

      # --- JWT Authentication (shared by jwt-auth and mcp-auth) ---
      jwtauth_v1:
        keymanagers:
          - name: agent-manager-service
            issuer: agent-manager-service
            jwks:
              remote:
                uri: http://amp-api.wso2-amp.svc.cluster.local:9000/auth/external/jwks.json
                skipTlsVerify: true
          - name: ThunderKeyManager
            issuer: http://thunder.amp.localhost:8080
            jwks:
              remote:
                uri: http://amp-thunder-extension-service.amp-thunder:8090/oauth2/jwks
                skipTlsVerify: true
        authheaderscheme: ""
        onfailurestatuscode: 401
        errormessageformat: json
        errormessage: "Authentication failed"
        leeway: 30s
        allowedalgorithms:
          - RS256
          - ES256
        jwkscachettl: 5m
        jwksfetchtimeout: 5s
        jwksfetchretrycount: 3
        jwksfetchretryinterval: 2s
        validateissuer: true

      # --- MCP Authentication (additional to jwtauth_v1) ---
      # mcpauth_v1:
      #   gatewayhost: "localhost"

    # Root-level config keys injected as environment variables into the
    # policy engine. Use for policies that reference ${config.<key>} at
    # root level (e.g., AWS Bedrock, Azure Content Safety, embedding providers).
    # Keys are converted to env vars: key_name -> APIP_GW_KEY__NAME
    # (underscores become double underscores to preserve them in koanf).
    #
    # Example:
    #   systemEnv:
    #     # AWS Bedrock Guardrail
    #     awsbedrock_guardrail_region: "us-east-1"
    #     awsbedrock_guardrail_id: ""
    #     awsbedrock_guardrail_version: "DRAFT"
    #     awsbedrock_access_key_id: ""
    #     awsbedrock_secret_access_key: ""
    #     awsbedrock_session_token: ""
    #     awsbedrock_role_arn: ""
    #     awsbedrock_role_region: ""
    #     awsbedrock_role_external_id: ""
    #
    #     # Azure Content Safety
    #     azurecontentsafety_endpoint: ""
    #     azurecontentsafety_key: ""
    #
    #     # Embedding Provider (semantic-cache, semantic-prompt-guard, semantic-tool-filtering)
    #     embedding_provider: "OPENAI"
    #     embedding_provider_endpoint: ""
    #     embedding_provider_model: "text-embedding-ada-002"
    #     embedding_provider_dimension: "1536"
    #     embedding_provider_api_key: ""
    #
    #     # Vector DB (semantic-cache)
    #     vector_db_provider: "REDIS"
    #     vector_db_provider_host: ""
    #     vector_db_provider_port: "6379"
    #     vector_db_provider_username: ""
    #     vector_db_provider_password: ""
    #     vector_db_provider_database: ""
    #     vector_db_provider_ttl: "3600"
    systemEnv: {}

# Bootstrap Job configuration
bootstrap:
  enabled: true
  backoffLimit: 3
  # TTL after completion (seconds). 86400 = 1 day
  ttlSecondsAfterFinished: 86400
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m
  podSecurityContext:
    runAsNonRoot: false
    runAsUser: 0
    fsGroup: 0
  securityContext:
    runAsNonRoot: false
    runAsUser: 0
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
