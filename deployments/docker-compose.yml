services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: agent-manager-db
    environment:
      POSTGRES_DB: agentmanager
      POSTGRES_USER: agentmanager
      POSTGRES_PASSWORD: agentmanager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentmanager"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-manager

  # Agent Manager Service (Go Backend)
  agent-manager-service:
    build:
      context: ../agent-manager-service
      dockerfile: Dockerfile.dev
    container_name: agent-manager-service
    ports:
      - "9000:8080"
      - "9243:9243"
    environment:
      # Database Configuration
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=agentmanager
      - DB_PASSWORD=agentmanager
      - DB_NAME=agentmanager
      # Server Configuration
      - SERVER_PORT=8080
      - SERVER_PUBLIC_URL=http://localhost:9000
      - OAUTH_AUTHORIZATION_SERVERS=http://thunder.amp.localhost:8080
      - RBAC_ENABLED=true
      # Kubernetes Configuration
      - KUBECONFIG=/app/.kube/config
      - IS_LOCAL_DEV_ENV=true
      # JWT Configuration
      - JWT_SIGNING_PRIVATE_KEY_PATH=/app/keys/private.pem
      - JWT_SIGNING_PUBLIC_KEYS_CONFIG=/app/keys/public-keys-config.json
      - JWT_SIGNING_ACTIVE_KEY_ID=key-1
      - JWT_SIGNING_DEFAULT_EXPIRY=8760h
      - JWT_SIGNING_ISSUER=agent-manager-service
      - JWT_SIGNING_DEFAULT_ENVIRONMENT=default
      # Optional: External Service URLs (add when needed)
      # - OPENCHOREO_API_URL=http://host.docker.internal:8000
      # - OPENSEARCH_URL=http://host.docker.internal:9200
      - OBSERVER_URL=http://host.docker.internal:8085
      - TRACE_OBSERVER_URL=http://host.docker.internal:9098
      - IDP_TOKEN_URL=http://thunder.amp.localhost:8080/oauth2/token
      - IDP_CLIENT_ID=amp-api-client
      - IDP_CLIENT_SECRET=amp-api-client-secret
      # Key Manager / JWT validation configuration
      # Accepts Thunder-issued tokens (client_credentials for publisher)
      - KEY_MANAGER_ISSUER=Agent Management Platform Local,http://thunder.amp.localhost:8080
      - KEY_MANAGER_AUDIENCE=localhost,amp-publisher-*,amp-api-client,amp-console-client,amctl,am-mcp,http://localhost:9000/
      - AMP_VERSION=v0.8.0
      - OPEN_CHOREO_BASE_URL=http://api.openchoreo.localhost:8195
      # OpenBao/Vault Secret Management Configuration
      # NOTE: Run ./deployments/scripts/port-forward.sh to forward OpenBao from k3d cluster
      # Uses the default OpenBao that comes with OpenChoreo for both user and system secrets
      - SECRET_MANAGER_PROVIDER=openbao
      - OPENBAO_URL=http://host.docker.internal:8200
      - OPENBAO_TOKEN=root
      - OPENBAO_PATH=secret
      - OPENBAO_VERSION=v2
      # Workflow Plane OpenBao (for git secrets and publisher credentials)
      - WORKFLOW_PLANE_OPENBAO_URL=http://host.docker.internal:8200
      - WORKFLOW_PLANE_OPENBAO_TOKEN=root
      # Thunder API (for per-org publisher credential provisioning)
      # Uses the system app's client_credentials with scope=system to get admin tokens.
      # Leave THUNDER_BASE_URL empty to fall back to static amp-publisher-client credentials.
      - THUNDER_BASE_URL=http://thunder.amp.localhost:8080
      - THUNDER_CLIENT_ID=amp-system-client
      - THUNDER_CLIENT_SECRET=amp-system-client-secret
      # Encryption Configuration (AES-256-GCM, hex-encoded 32-byte key)
      - ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    volumes:
      # Mount source code for hot-reloading
      - ../agent-manager-service:/app
      # Use container-specific keys (not host) so paths are correct
      - agent_manager_keys:/app/keys
      # Exclude vendor and tmp directories from mount
      - /app/vendor
      - /app/tmp
      - /app/.bin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agent-manager
      - k3d-openchoreo-local-setup # Connect to k3d cluster network for hostname resolution
    extra_hosts:
      - "host.docker.internal:host-gateway"
      # OpenChoreo API uses Host-based routing via Kgateway on port 8080.
      # The gateway routes requests based on the Host header, so we need the
      # hostname to resolve to the host machine for proper routing.
      - "api.openchoreo.localhost:host-gateway"
      # Thunder IDP for OAuth2 token exchange (must match OpenChoreo's security.oidc config)
      - "thunder.amp.localhost:host-gateway"
      # API Platform Gateway runtime for agent endpoint access
      - "api-platform-gateway.amp.localhost:host-gateway"

  # Agent Manager Console (React Frontend)
  agent-manager-console:
    build:
      context: ../console
      dockerfile: Dockerfile.dev
      args:
        # Pass the host's absolute path so the container WORKDIR matches,
        # ensuring rush/pnpm symlinks resolve to the same paths on both sides.
        WORKDIR_PATH: ${CONSOLE_HOST_PATH}
    container_name: agent-manager-console
    ports:
      - "3000:3000"
    environment:
      - AUTH_CLIENT_ID=amp-console-client
      - AUTH_BASE_URL=http://thunder.amp.localhost:8080
      - SIGN_IN_REDIRECT_URL=http://localhost:3000/login
      - SIGN_OUT_REDIRECT_URL=http://localhost:3000/login
      - API_BASE_URL=http://localhost:9000
      - DISABLE_AUTH=false
      - AUTH_SCOPES=openid profile email org:view org:modify-settings org:invite-member org:remove-member org:assign-role org:manage-idp org:manage-service-account project:create project:read project:update project:delete environment:create environment:read environment:update environment:delete gateway:create gateway:read gateway:update gateway:delete gateway:token:manage data-plane:read deployment-pipeline:read git-secret:create git-secret:read git-secret:delete llm-provider-template:create llm-provider-template:read llm-provider-template:update llm-provider-template:delete llm-provider:create llm-provider:read llm-provider:update llm-provider:delete llm-provider:configure-guardrail llm-provider:connect llm-provider:deploy llm-provider:api-key:manage mcp-server:create mcp-server:read mcp-server:update mcp-server:delete mcp-server:configure-guardrail mcp-server:connect llm-proxy:create llm-proxy:read llm-proxy:update llm-proxy:delete llm-proxy:deploy llm-proxy:api-key:manage evaluator:create evaluator:read evaluator:update evaluator:delete agent:create agent:read agent:update agent:delete agent:build agent:deploy:non-production agent:deploy:production agent:promote agent:rollback agent:suspend agent:token:manage monitor:create monitor:read monitor:update monitor:delete monitor:execute monitor:score:read monitor:score:publish observability:org-dashboard observability:project-dashboard observability:guardrail-metric observability:infra-metric role:create role:read role:update role:delete group:create group:read group:update group:delete catalog:read repository:read agent-kind:read agent-kind:create agent-kind:update agent-kind:delete
      - RBAC_ENABLED=true
      - OBS_API_BASE_URL=http://localhost:9098
      - GATEWAY_CONTROL_PLANE_URL=http://localhost:9243
      - GATEWAY_VERSION=v0.11.0
      - INSTRUMENTATION_URL=http://localhost:22893/otel
      - GUARDRAILS_CATALOG_URL=https://db720294-98fd-40f4-85a1-cc6a3b65bc9a-prod.e1-us-east-azure.choreoapis.dev/api-platform/policy-hub-api/policy-hub-public/v1.0/policies?categories=Guardrails,AI&limit=100
      - GUARDRAILS_DEFINITION_BASE_URL=https://db720294-98fd-40f4-85a1-cc6a3b65bc9a-prod.e1-us-east-azure.choreoapis.dev/api-platform/policy-hub-api/policy-hub-public/v1.0/policies
      - DOCS_URL=https://wso2.github.io/agent-manager/docs/next
    volumes:
      # Mount source code at the SAME absolute path as on the host so that
      # rush/pnpm symlinks in common/temp resolve identically in the container.
      - ${CONSOLE_HOST_PATH}:${CONSOLE_HOST_PATH}
      # Overlay node_modules and common/temp with named volumes so the container
      # keeps its own Linux-built binaries separate from the host's macOS ones.
      - console_node_modules:${CONSOLE_HOST_PATH}/node_modules
      - console_common_temp:${CONSOLE_HOST_PATH}/common/temp
    networks:
      - agent-manager
    depends_on:
      - agent-manager-service

volumes:
  postgres_data:
  console_node_modules:
  console_common_temp:
  agent_manager_keys:

networks:
  agent-manager:
    driver: bridge
  k3d-openchoreo-local-setup:
    external: true
